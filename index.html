<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eShop365 Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Main Navigation (Bottom) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); display: flex; border-top: 1px solid #334155; z-index: 1000; height: 60px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #94a3b8; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 20px; margin-bottom: 3px; }

        .container { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
        .content { display: none; }
        .content.active { display: block; }

        /* Grid Layout */
        .section-title { color: var(--primary); margin: 15px 0 10px 0; font-size: 13px; font-weight: bold; text-transform: uppercase; border-left: 3px solid var(--primary); padding-left: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .category-card { background: var(--card); padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #334155; font-size: 13px; }

        /* Product Gallery */
        #gallery-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .product-card { background: var(--card); border-radius: 12px; border: 1px solid #334155; overflow: hidden; position: relative; }
        .product-card img { width: 100%; height: 150px; object-fit: cover; }

        /* Modal & Size */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; display: none; padding: 20px; box-sizing: border-box; }
        .size-box { display: flex; gap: 10px; margin: 15px 0; }
        .size-btn { padding: 8px 15px; background: #334155; border-radius: 5px; cursor: pointer; border: 1px solid transparent; }
        .size-btn.selected { border-color: var(--primary); color: var(--primary); }
        .input { width: 100%; padding: 12px; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 10px; margin-top: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; color: white; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="page-store" class="content active">
            <div class="section-title">👕 T-Shirts</div>
            <div class="grid">
                <div class="category-card" onclick="loadProducts('tshirts/printed/', 'Printed T-shirt')">Printed</div>
                <div class="category-card" onclick="loadProducts('tshirts/polo/', 'Polo T-shirt')">Polo</div>
            </div>
            <div class="section-title">👔 Shirts</div>
            <div class="grid">
                <div class="category-card" onclick="loadProducts('shirt/formal/', 'Formal Shirt')">Formal</div>
                <div class="category-card" onclick="loadProducts('shirt/casual/', 'Casual Shirt')">Casual</div>
            </div>
            <div class="section-title">👖 Pants</div>
            <div class="grid">
                <div class="category-card" onclick="loadProducts('pants/jeans/', 'Jeans Pant')">Jeans</div>
                <div class="category-card" onclick="loadProducts('pants/formal/', 'Formal Pant')">Formal</div>
            </div>
        </div>

        <div id="page-profile" class="content">
            <div style="background:var(--card); padding:20px; border-radius:15px; text-align:center;">
                <h3 id="u-name">User</h3>
                <small id="u-id" style="color:var(--primary);">#000000</small>
            </div>

            <div class="section-title">Shipping Address</div>
            <div id="address-box" style="background:var(--card); padding:15px; border-radius:12px;">
                <input type="text" id="ship-name" class="input" placeholder="Full Name">
                <textarea id="ship-addr" class="input" placeholder="Detailed Address..." style="height:60px;"></textarea>
                <button class="btn" style="background:var(--primary);" onclick="saveAddress()">Save & Hide</button>
            </div>
            <div id="address-saved" style="display:none; color:var(--primary); padding:10px; text-align:center;">
                ✅ Address Saved! <span onclick="showAddress()" style="text-decoration:underline; cursor:pointer; margin-left:10px;">Edit</span>
            </div>

            <div class="section-title">Order Record (Cart)</div>
            <div id="cart-list"></div>
            <div id="order-btn-area" style="display:none;">
                <button class="btn" style="background:#22c55e;" onclick="sendFinalOrder()">Confirm Order Now</button>
            </div>
        </div>
    </div>

    <div id="gallery-view">
        <button onclick="closeGallery()" style="background:none; border:none; color:var(--primary); font-size:18px; margin-bottom:15px;"><i class="fas fa-arrow-left"></i> Back</button>
        <div class="grid" id="product-list"></div>
    </div>

    <div id="details-modal" class="modal">
        <button onclick="closeModal()" style="color:white; background:none; border:none; font-size:20px;"><i class="fas fa-times"></i></button>
        <img id="m-img" src="" style="width:100%; border-radius:15px; margin-top:15px;">
        <h2 id="m-title" style="margin:15px 0 5px 0;">Product</h2>
        <p style="font-size:24px; color:var(--primary); font-weight:bold;">$15.00</p>
        
        <label style="display:block; margin-top:15px;">Select Size:</label>
        <div class="size-box">
            <div class="size-btn" onclick="selectSize('M', this)">M</div>
            <div class="size-btn" onclick="selectSize('L', this)">L</div>
            <div class="size-btn" onclick="selectSize('XL', this)">XL</div>
        </div>

        <button class="btn" style="background:var(--primary);" onclick="addToCart()">Add to AddCart</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="nav('store', this)"><i class="fas fa-home"></i>Store</div>
        <div class="nav-item" onclick="nav('profile', this)"><i class="fas fa-user"></i>Profile</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const IMG_URL = "https://raw.githubusercontent.com/Zoha742/eshopbot/main/products/";
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let selectedSize = 'M';
        let currentItem = {};

        function nav(page, el) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            el.classList.add('active');
            if(page === 'profile') renderCart();
        }

        function loadProducts(path, name) {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            document.getElementById('gallery-view').style.display = 'block';
            for(let i=1; i<=6; i++) {
                const img = `${IMG_URL}${path}${i}.jpg`;
                list.innerHTML += `<div class="product-card" onclick="openModal('${img}', '${name} #${i}')">
                    <img src="${img}" onerror="this.src='https://via.placeholder.com/150'">
                    <div style="padding:10px; text-align:center;"><b>$15.00</b></div>
                </div>`;
            }
        }

        function closeGallery() { document.getElementById('gallery-view').style.display = 'none'; }

        function openModal(img, title) {
            currentItem = { img, title, price: 15 };
            document.getElementById('m-img').src = img;
            document.getElementById('m-title').innerText = title;
            document.getElementById('details-modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('details-modal').style.display = 'none'; }

        function selectSize(size, el) {
            selectedSize = size;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        }

        function addToCart() {
            cart.push({...currentItem, size: selectedSize});
            localStorage.setItem('cart', JSON.stringify(cart));
            tg.showPopup({ message: "Item added to AddCart!" });
            closeModal();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            if(cart.length === 0) { list.innerHTML = "Cart is empty."; document.getElementById('order-btn-area').style.display = 'none'; return; }
            list.innerHTML = cart.map((i, idx) => `<div style="background:#0f172a; padding:10px; border-radius:10px; margin-bottom:5px;">${i.title} (${i.size}) - $${i.price} <span onclick="removeItem(${idx})" style="float:right; color:red;">🗑️</span></div>`).join('');
            document.getElementById('order-btn-area').style.display = 'block';
        }

        function removeItem(idx) { cart.splice(idx, 1); localStorage.setItem('cart', JSON.stringify(cart)); renderCart(); }

        function saveAddress() {
            const n = document.getElementById('ship-name').value;
            const a = document.getElementById('ship-addr').value;
            if(!n || !a) return;
            localStorage.setItem('name', n); localStorage.setItem('addr', a);
            document.getElementById('address-box').style.display = 'none';
            document.getElementById('address-saved').style.display = 'block';
        }

        function showAddress() {
            document.getElementById('address-box').style.display = 'block';
            document.getElementById('address-saved').style.display = 'none';
        }

        function sendFinalOrder() {
            const n = localStorage.getItem('name');
            const a = localStorage.getItem('addr');
            if(!n) { tg.showAlert("Please save address first!"); return; }
            const data = { user: tg.initDataUnsafe.user, items: cart, addr: {name: n, a: a}, total: cart.length*15 };
            tg.sendData(JSON.stringify(data));
            cart = []; localStorage.removeItem('cart');
            tg.close();
        }

        // Init
        const u = tg.initDataUnsafe.user;
        if(u) { document.getElementById('u-name').innerText = u.first_name; document.getElementById('u-id').innerText = "#" + u.id; }
        if(localStorage.getItem('name')) { saveAddress(); }
    </script>
</body>
</html>
