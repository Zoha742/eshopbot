<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eShop365 Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; margin: 0; padding: 0; }
        .tabs { display: flex; background: #1e293b; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #94a3b8; }
        .tab.active { color: #38bdf8; border-bottom: 3px solid #38bdf8; background: #1e293b; }
        .content { display: none; padding: 15px; }
        .content.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #334155; cursor: pointer; }
        .prod-card { background: #1e293b; border-radius: 10px; overflow: hidden; border: 1px solid #334155; margin-bottom: 10px; cursor: pointer; }
        .prod-card img { width: 100%; height: 160px; object-fit: cover; }
        .details-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 200; display: none; padding: 20px; overflow-y: auto; }
        .btn-full { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; color: white; }
        .select-box { background: #1e293b; border: 1px solid #334155; color: white; padding: 10px; border-radius: 5px; width: 100%; margin-top: 5px; }
        .cart-item { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #38bdf8; }
        .bill-row { display: flex; justify-content: space-between; margin-bottom: 5px; color: #94a3b8; }
        .total-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; margin-top: 10px; border-top: 1px solid #334155; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="tabs">
        <div id="tab-shop" class="tab active" onclick="openTab('store')">🏪 STORE</div>
        <div id="tab-profile" class="tab" onclick="openTab('profile')">👤 PROFILE</div>
    </div>

    <div id="store" class="content active">
        <div id="cat-menu" class="grid">
            <div class="card" onclick="loadGal('tshirts/printed/', 'T-Shirts')">👕 T-Shirts</div>
            <div class="card" onclick="loadGal('shirt/casual/', 'Shirts')">👔 Shirts</div>
            <div class="card" onclick="loadGal('shirt/formal/', 'Formal')">💼 Formal</div>
            <div class="card" onclick="loadGal('pants/jeans/', 'Pants')">👖 Pants</div>
            <div class="card" onclick="loadGal('panjabi/easy/', 'Panjabi')">🕌 Panjabi</div>
            <div class="card" onclick="loadGal('accessories/belt/', 'Acc')">⌚ Accessories</div>
        </div>
        <div id="gallery" style="display:none;">
            <button onclick="backToMenu()" style="color:#38bdf8; background:none; border:none; cursor:pointer; margin-bottom:15px;">⬅️ Back to Menu</button>
            <div class="grid" id="g-container"></div>
        </div>
    </div>

    <div id="profile" class="content">
        <div style="background:#1e293b; padding:15px; border-radius:10px; margin-bottom:15px; border: 1px solid #334155;">
            <h3 id="u-name">Guest</h3>
            <p id="u-id" style="color:#38bdf8; font-family: monospace;">#000000</p>
        </div>

        <h4>🛒 Shopping Cart & Bill</h4>
        <div id="cart-list">
            <p style="color:#64748b; text-align: center;">Your cart is empty.</p>
        </div>

        <div id="bill-details" style="display:none; margin-top: 20px; background: #1e293b; padding: 15px; border-radius: 10px;">
            <div class="bill-row"><span>Sub-total:</span> <span id="sub-total">$0</span></div>
            <div class="bill-row"><span>Delivery:</span> <span id="del-charge">$2</span></div>
            <div class="total-row"><span>Total Bill:</span> <span id="total-bill">$0</span></div>
            <button class="btn-full" style="background:#22c55e;" onclick="checkout()">Checkout with TON / Bkash</button>
        </div>
    </div>

    <div id="details-page" class="details-page">
        <button onclick="closeDetails()" style="color:#38bdf8; background:none; border:none; margin-bottom:15px; font-size: 18px;">❌ Close</button>
        <img id="det-img" src="" style="width:100%; border-radius:12px; height: 300px; object-fit: cover;">
        <h2 id="det-title" style="margin: 15px 0 5px 0;">Product Name</h2>
        <p style="color:#38bdf8; font-size: 22px; font-weight: bold; margin: 5px 0;">$15.00</p>
        
        <div style="margin-top: 20px;">
            <label>Select Size:</label>
            <select id="size-sel" class="select-box">
                <option>M</option><option>L</option><option>XL</option><option>XXL</option>
            </select>

            <label style="display:block; margin-top:15px;">Select Color:</label>
            <select id="color-sel" class="select-box">
                <option>Black</option><option>White</option><option>Navy Blue</option><option>Olive</option>
            </select>
        </div>

        <button class="btn-full" style="background:#38bdf8;" onclick="addToCart()">🛒 Add to Cart</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const IMG_URL = "https://raw.githubusercontent.com/Zoha742/eshopbot/main/products/";
        let cart = [];
        let currentItem = {};

        function openTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('tab-' + id).classList.add('active');
            if(id === 'profile') renderCart();
        }

        function loadGal(path, title) {
            document.getElementById('cat-menu').style.display = 'none';
            document.getElementById('gallery').style.display = 'block';
            const container = document.getElementById('g-container');
            container.innerHTML = '⌛ Loading...';
            
            setTimeout(() => {
                container.innerHTML = '';
                for(let i=1; i<=6; i++) {
                    const img = `${IMG_URL}${path}${i}.jpg`;
                    container.innerHTML += `
                    <div class="prod-card" onclick="openDetails('${img}', '${title} - Item #${i}')">
                        <img src="${img}" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                        <div style="padding:10px; text-align:center; font-weight:bold;">$15.00</div>
                    </div>`;
                }
            }, 300);
        }

        function openDetails(img, title) {
            currentItem = { img, title, price: 15 };
            document.getElementById('det-img').src = img;
            document.getElementById('det-title').innerText = title;
            document.getElementById('details-page').style.display = 'block';
        }

        function closeDetails() { document.getElementById('details-page').style.display = 'none'; }

        function addToCart() {
            const size = document.getElementById('size-sel').value;
            const color = document.getElementById('color-sel').value;
            cart.push({ ...currentItem, size, color });
            tg.showPopup({ message: "Added to cart!" });
            closeDetails();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const bill = document.getElementById('bill-details');
            if(cart.length === 0) {
                list.innerHTML = '<p style="color:#64748b; text-align:center;">Your cart is empty.</p>';
                bill.style.display = 'none';
                return;
            }
            list.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div style="display:flex; justify-content:space-between;">
                        <b>${item.title}</b>
                        <span style="color:#ef4444;" onclick="removeItem(${index})">🗑️</span>
                    </div>
                    <div style="font-size:12px; color:#94a3b8; margin-top:5px;">Size: ${item.size} | Color: ${item.color} | Price: $${item.price}</div>
                </div>
            `).join('');

            const sub = cart.reduce((acc, item) => acc + item.price, 0);
            document.getElementById('sub-total').innerText = '$' + sub;
            document.getElementById('total-bill').innerText = '$' + (sub + 2);
            bill.style.display = 'block';
        }

        function removeItem(idx) {
            cart.splice(idx, 1);
            renderCart();
        }

        function backToMenu() {
            document.getElementById('cat-menu').style.display = 'grid';
            document.getElementById('gallery').style.display = 'none';
        }

        function checkout() {
            tg.showPopup({
                title: 'Confirm Payment',
                message: 'Total: ' + document.getElementById('total-bill').innerText + '\nProceed to pay?',
                buttons: [{text: 'Yes', type: 'ok'}, {text: 'No', type: 'destructive'}]
            });
        }

        const user = tg.initDataUnsafe.user;
        if(user) {
            document.getElementById('u-name').innerText = user.first_name + ' ' + (user.last_name || '');
            document.getElementById('u-id').innerText = "#" + user.id;
        }
    </script>
</body>
</html>
