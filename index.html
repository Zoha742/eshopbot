<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium eShop Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; text-align: center; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background: #0088cc; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
        .profile { display: none; margin-top: 20px; text-align: left; background: #eee; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>💎 Premium eShop</h2>
    
    <div class="card">
        <h3>Payment Method</h3>
        <button class="btn" id="ton-connect">Connect TON Wallet</button>
        <button class="btn" style="background: #28a745;" onclick="localPayment()">Local Payment (Bkash/Rocket)</button>
    </div>

    <div id="user-info" class="card">
        <h3>User Profile</h3>
        <p id="username">Loading...</p>
        <hr>
        <h4>My Orders (Receipts)</h4>
        <div id="order-list">No orders yet.</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById('username').innerText = "User: " + (tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Guest");

        function localPayment() {
            alert("Please send the amount to our local number and provide the transaction ID in the bot.");
            tg.close(); // বটের চ্যাটে ফিরিয়ে নিয়ে যাবে পেমেন্ট ডিটেইলস দিতে
        }

        // TON Connect Logic (Simple Placeholder)
        document.getElementById('ton-connect').onclick = function() {
            alert("Connecting to TON Wallet...");
            // এখানে TON Connect API ইন্টিগ্রেট হবে
        };
    </script>
</body>
</html>
