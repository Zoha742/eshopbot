<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eShop365 Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; margin: 0; padding: 0; }
        .tabs { display: flex; background: #1e293b; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #94a3b8; }
        .tab.active { color: #38bdf8; border-bottom: 3px solid #38bdf8; }
        .content { display: none; padding: 15px; }
        .content.active { display: block; }
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .cat-card { background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
        .prod-card { background: #1e293b; border-radius: 10px; overflow: hidden; border: 1px solid #334155; margin-bottom: 10px; cursor: pointer; }
        .prod-card img { width: 100%; height: 160px; object-fit: cover; }
        .details-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 200; display: none; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        .select-box { background: #1e293b; border: 1px solid #334155; color: white; padding: 8px; border-radius: 5px; width: 100%; margin-top: 5px; }
        .btn-full { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; color: white; }
        .cart-item { background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #38bdf8; }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" onclick="openTab('store')">🏪 STORE</div>
        <div class="tab" onclick="openTab('profile')">👤 PROFILE</div>
    </div>

    <div id="store" class="content active">
        <div id="cat-menu">
            <div class="cat-grid">
                <div class="cat-card" onclick="loadGal('tshirts/printed/', 'T-Shirts')">👕 T-Shirts</div>
                <div class="cat-card" onclick="loadGal('shirt/casual/', 'Shirts')">👔 Shirts</div>
                <div class="cat-card" onclick="loadGal('pants/jeans/', 'Pants')">👖 Pants</div>
                <div class="cat-card" onclick="loadGal('panjabi/easy/', 'Panjabi')">🕌 Panjabi</div>
            </div>
        </div>
        <div id="gallery" style="display:none;">
            <button onclick="backToMenu()" style="color:#38bdf8; background:none; border:none; cursor:pointer; margin-bottom:10px;">⬅️ Back</button>
            <div class="cat-grid" id="g-container"></div>
        </div>
    </div>

    <div id="details-page" class="details-page">
        <button onclick="closeDetails()" style="color:#38bdf8; background:none; border:none; margin-bottom:15px;">❌ Close</button>
        <img id="det-img" src="" style="width:100%; border-radius:10px;">
        <h2 id="det-title">Product Name</h2>
        <p class="price" style="font-size:20px; color:#38bdf8;">Price: $15.00</p>
        <p style="font-size:12px; color:#94a3b8;">🚚 Delivery Charge: $2.00 (Inside City)</p>
        
        <label>Select Size:</label>
        <select id="size-sel" class="select-box">
            <option>M</option><option>L</option><option>XL</option><option>XXL</option>
        </select>

        <label style="display:block; margin-top:10px;">Select Color:</label>
        <select id="color-sel" class="select-box">
            <option>Black</option><option>White</option><option>Blue</option>
        </select>

        <button class="btn-full" style="background:#0088cc;" onclick="addToCart()">🛒 Add to Cart</button>
    </div>

    <div id="profile" class="content">
        <div style="background:#1e293b; padding:15px; border-radius:10px; margin-bottom:15px;">
            <h3>User: <span id="u-name">Guest</span></h3>
            <p>ID: <span id="u-id" style="color:#38bdf8;">#000000</span></p>
        </div>
        <h4>🛒 Your Cart Items</h4>
        <div id="cart-list">
            <p style="color:#64748b;">Your cart is empty.</p>
        </div>
        <button class="btn-full" style="background:#22c55e;" onclick="alert('Proceeding to Payment...')">Proceed to Checkout</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const IMG_URL = "https://raw.githubusercontent.com/Zoha742/eshopbot/main/products/";
        let currentItem = {};
        let cart = JSON.parse(localStorage.getItem('eshop_cart')) || [];

        function openTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'profile') renderCart();
        }

        function loadGal(path, title) {
            document.getElementById('cat-menu').style.display = 'none';
            document.getElementById('gallery').style.display = 'block';
            const container = document.getElementById('g-container');
            container.innerHTML = '';
            for(let i=1; i<=6; i++) {
                const img = `${IMG_URL}${path}${i}.jpg`;
                container.innerHTML += `
                <div class="prod-card" onclick="openDetails('${img}', '${title} Item #${i}')">
                    <img src="${img}" onerror="this.src='https://via.placeholder.com/150'">
                    <div style="padding:8px; text-align:center;">$15.00</div>
                </div>`;
            }
        }

        function openDetails(img, title) {
            currentItem = { img, title, price: 15.00 };
            document.getElementById('det-img').src = img;
            document.getElementById('det-title').innerText = title;
            document.getElementById('details-page').style.display = 'block';
        }

        function closeDetails() { document.getElementById('details-page').style.display = 'none'; }

        function addToCart() {
            const size = document.getElementById('size-sel').value;
            const color = document.getElementById('color-sel').value;
            cart.push({ ...currentItem, size, color });
            localStorage.setItem('eshop_cart', JSON.stringify(cart));
            tg.showPopup({ message: "Added to cart successfully!" });
            closeDetails();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            if(cart.length === 0) return;
            list.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <b>${item.title}</b><br>
                    Size: ${item.size} | Color: ${item.color} | $${item.price}
                </div>
            `).join('');
        }

        function backToMenu() {
            document.getElementById('cat-menu').style.display = 'grid';
            document.getElementById('gallery').style.display = 'none';
        }

        const user = tg.initDataUnsafe.user;
        if(user) {
            document.getElementById('u-name').innerText = user.first_name;
            document.getElementById('u-id').innerText = "#" + user.id.toString().slice(-6);
        }
    </script>
</body>
</html>
