<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eShop365</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
        
        /* Fixed Header Tabs */
        .tabs { display: flex; background: var(--card); border-bottom: 1px solid #334155; flex-shrink: 0; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-weight: bold; color: #94a3b8; font-size: 14px; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        
        /* Scrollable Content Area */
        .scroll-area { flex-grow: 1; overflow-y: auto; padding: 10px; padding-bottom: 80px; } /* padding-bottom to see bottom items */
        .content { display: none; }
        .content.active { display: block; }
        
        /* Layout Improvements */
        .section-title { color: var(--primary); margin: 15px 0 8px 0; font-size: 13px; font-weight: bold; text-transform: uppercase; border-left: 3px solid var(--primary); padding-left: 8px; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .category-card { background: var(--card); padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #334155; font-size: 13px; }

        /* Gallery and Product Grid */
        #gallery-view { position: fixed; top: 45px; left: 0; width: 100%; height: calc(100% - 45px); background: var(--bg); z-index: 200; display: none; padding: 10px; box-sizing: border-box; overflow-y: auto; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 50px; }
        .prod-card { background: var(--card); border-radius: 12px; border: 1px solid #334155; overflow: hidden; position: relative; }
        .prod-card img { width: 100%; height: 140px; object-fit: cover; display: block; }
        
        /* Details Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 300; display: none; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .input { width: 100%; padding: 10px; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 8px; margin-top: 8px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; color: white; font-size: 14px; }
    </style>
</head>
<body>

    <div class="tabs">
        <div id="t-store" class="tab active" onclick="switchTab('store')">STORE</div>
        <div id="t-profile" class="tab" onclick="switchTab('profile')">PROFILE</div>
    </div>

    <div class="scroll-area">
        <div id="store" class="content active">
            <div class="section-title">👕 T-Shirts</div>
            <div class="main-grid">
                <div class="category-card" onclick="loadProducts('tshirts/printed/', 'Printed T-shirt')">Printed</div>
                <div class="category-card" onclick="loadProducts('tshirts/polo/', 'Polo T-shirt')">Polo</div>
            </div>

            <div class="section-title">👔 Shirts</div>
            <div class="main-grid">
                <div class="category-card" onclick="loadProducts('shirt/formal/', 'Formal Shirt')">Formal</div>
                <div class="category-card" onclick="loadProducts('shirt/casual/', 'Casual Shirt')">Casual</div>
                <div class="category-card" onclick="loadProducts('shirt/half/', 'Half Shirt')">Half</div>
            </div>

            <div class="section-title">👖 Pants</div>
            <div class="main-grid">
                <div class="category-card" onclick="loadProducts('pants/jeans/', 'Jeans Pant')">Jeans</div>
                <div class="category-card" onclick="loadProducts('pants/formal/', 'Formal Pant')">Formal</div>
            </div>

            <div id="gallery-view">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <button onclick="hideGal()" style="background:none; border:none; color:var(--primary); font-weight:bold;">⬅️ Back</button>
                    <span id="gal-title">Items</span>
                </div>
                <div class="product-grid" id="product-container"></div>
            </div>
        </div>

        <div id="profile" class="content">
            <div style="background:var(--card); padding:15px; border-radius:10px; text-align:center;">
                <h3 id="u-name" style="margin:0;">User</h3>
                <small id="u-id" style="color:var(--primary);">#000000</small>
            </div>

            <div class="section-title">Shipping Address</div>
            <div style="background:var(--card); padding:15px; border-radius:10px;">
                <input type="text" id="ship-name" class="input" placeholder="Your Name">
                <textarea id="ship-addr" class="input" placeholder="Address..." style="height:60px;"></textarea>
                <button class="btn" style="background:var(--primary);" onclick="saveAddr()">Save Address</button>
            </div>

            <div class="section-title">My Cart</div>
            <div id="cart-list"></div>
            <div id="checkout-area" style="display:none; margin-top:15px; border-top:1px solid #334155; padding-top:10px;">
                <p>Total: <span id="total-val" style="font-weight:bold; color:var(--primary);">$0</span></p>
                <button class="btn" style="background:#22c55e;" onclick="sendOrder()">Confirm Order</button>
            </div>
        </div>
    </div>

    <div id="details-modal" class="modal">
        <button onclick="closeModal()" style="color:var(--primary); background:none; border:none; font-weight:bold;">❌ Close</button>
        <img id="m-img" src="" style="width:100%; border-radius:12px; margin-top:10px;">
        <h2 id="m-title" style="margin:10px 0;">Product</h2>
        <p style="font-size:20px; color:var(--primary); font-weight:bold; margin:0;">$15.00</p>
        <select id="m-color" class="input"><option>Black</option><option>White</option><option>Navy</option></select>
        <button class="btn" style="background:var(--primary);" onclick="addToCart()">Add to Cart</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const IMG_BASE = "https://raw.githubusercontent.com/Zoha742/eshopbot/main/products/";
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let currentItem = {};

        function switchTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('t-' + id).classList.add('active');
            if(id === 'profile') renderCart();
        }

        // Load exactly 6 images
        function loadProducts(path, name) {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            document.getElementById('gallery-view').style.display = 'block';
            document.getElementById('gal-title').innerText = name;

            for(let i=1; i<=6; i++) {
                const imgUrl = `${IMG_BASE}${path}${i}.jpg`;
                container.innerHTML += `
                    <div class="prod-card" onclick="openModal('${imgUrl}', '${name} #${i}')">
                        <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/150?text=Image+Coming'">
                        <div style="padding:8px; text-align:center; font-weight:bold;">$15</div>
                    </div>`;
            }
        }

        function hideGal() { document.getElementById('gallery-view').style.display = 'none'; }

        function openModal(img, title) {
            currentItem = { img, title, price: 15 };
            document.getElementById('m-img').src = img;
            document.getElementById('m-title').innerText = title;
            document.getElementById('details-modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('details-modal').style.display = 'none'; }

        function addToCart() {
            const color = document.getElementById('m-color').value;
            cart.push({...currentItem, color});
            localStorage.setItem('cart', JSON.stringify(cart));
            tg.showPopup({ message: "Added to Cart!" });
            closeModal();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            if(cart.length === 0) { list.innerHTML = "Cart is empty."; document.getElementById('checkout-area').style.display = 'none'; return; }
            list.innerHTML = cart.map((i, idx) => `
                <div style="background:var(--card); padding:10px; border-radius:8px; margin-bottom:5px;">
                    ${i.title} (${i.color}) - $${i.price}
                    <span onclick="removeCart(${idx})" style="float:right; color:#ef4444;">🗑️</span>
                </div>`).join('');
            document.getElementById('total-val').innerText = '$' + (cart.length * 15);
            document.getElementById('checkout-area').style.display = 'block';
        }

        function removeCart(idx) { cart.splice(idx, 1); localStorage.setItem('cart', JSON.stringify(cart)); renderCart(); }

        function saveAddr() {
            const n = document.getElementById('ship-name').value;
            const a = document.getElementById('ship-addr').value;
            if(!n || !a) return;
            localStorage.setItem('name', n); localStorage.setItem('addr', a);
            tg.showPopup({ message: "Address Saved!" });
        }

        function sendOrder() {
            const n = localStorage.getItem('name');
            const a = localStorage.getItem('addr');
            if(!n) return tg.showAlert("Please save address first!");
            const orderData = { user: tg.initDataUnsafe.user, items: cart, addr: {name: n, a: a}, total: cart.length*15 };
            tg.sendData(JSON.stringify(orderData));
            cart = []; localStorage.removeItem('cart');
            tg.close();
        }

        // Initial setup
        const u = tg.initDataUnsafe.user;
        if(u) { document.getElementById('u-name').innerText = u.first_name; document.getElementById('u-id').innerText = "#" + u.id; }
        document.getElementById('ship-name').value = localStorage.getItem('name') || '';
        document.getElementById('ship-addr').value = localStorage.getItem('addr') || '';
    </script>
</body>
</html>
