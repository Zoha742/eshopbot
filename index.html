<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eShop365 Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; margin: 0; padding: 15px; }
        .tab-nav { display: flex; justify-content: space-around; border-bottom: 2px solid #1e293b; margin-bottom: 20px; position: sticky; top: 0; background: #0f172a; z-index: 10; }
        .tab { padding: 12px; cursor: pointer; color: #94a3b8; font-weight: 600; }
        .tab.active { color: #38bdf8; border-bottom: 3px solid #38bdf8; }
        .content { display: none; }
        .content.active { display: block; }
        .card { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-ton { background: #0088cc; color: white; }
        .btn-local { background: #22c55e; color: white; }
        .user-id { background: #334155; padding: 5px 10px; border-radius: 5px; font-family: monospace; color: #38bdf8; }
    </style>
</head>
<body>
    <div class="tab-nav">
        <div class="tab active" onclick="showTab('shop')">🛒 Shop</div>
        <div class="tab" onclick="showTab('profile')">👤 Profile</div>
    </div>

    <div id="shop" class="content active">
        <h2>Premium Collection</h2>
        <div class="card">
            <p>Select items from the bot to see them here.</p>
        </div>
    </div>

    <div id="profile" class="content">
        <div class="card">
            <h3>User Information</h3>
            <p>User: <span id="display-name">Guest</span></p>
            <p>User ID: <span id="uid" class="user-id">#000000</span></p>
        </div>
        
        <div class="card">
            <h3>💳 Wallet & Payment</h3>
            <button class="btn btn-ton" onclick="showPayPopup('TON')">Connect TON Wallet</button>
            <button class="btn btn-local" onclick="showPayPopup('Bkash/Nagad')">Local Payment</button>
        </div>

        <div class="card">
            <h3>📦 My Orders</h3>
            <button class="btn" style="background: #6366f1; color: white;" onclick="showOrderPopup()">Check Recent Orders</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function showTab(name) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // পেমেন্ট এবং অর্ডার পপআপ
        function showPayPopup(method) {
            tg.showPopup({ title: 'Payment Status', message: `Proceed with ${method} payment system?`, buttons: [{text: 'Proceed', type: 'ok'}, {text: 'Cancel', type: 'destructive'}] });
        }

        function showOrderPopup() {
            tg.showPopup({ title: 'Order Details', message: 'Generating payment invoice for your cart items...', buttons: [{text: 'Pay Now', type: 'ok'}] });
        }

        // ইউজার আইডি এবং নাম জেনারেশন
        const user = tg.initDataUnsafe.user;
        if(user) {
            document.getElementById('display-name').innerText = user.first_name;
            document.getElementById('uid').innerText = "#" + (user.id).toString().slice(-6);
        }
    </script>
</body>
</html>
