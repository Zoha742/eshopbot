<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eShop365 Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; margin: 0; padding: 0; }
        .tabs { display: flex; background: #1e293b; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #94a3b8; }
        .tab.active { color: #38bdf8; border-bottom: 3px solid #38bdf8; }
        .content { display: none; padding: 15px; }
        .content.active { display: block; }
        
        /* Grid and Cards */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: #1e293b; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #334155; cursor: pointer; }
        .sub-text { display: block; font-size: 10px; color: #94a3b8; margin-top: 4px; }
        
        /* Gallery */
        .prod-card { background: #1e293b; border-radius: 10px; border: 1px solid #334155; margin-bottom: 10px; position: relative; }
        .prod-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px 10px 0 0; }
        
        /* Details and Cart */
        .details-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 200; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .btn-full { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; color: white; }
        .cart-item { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        
        .bill-box { background: #1e293b; padding: 15px; border-radius: 12px; border: 1px solid #334155; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="tabs">
        <div id="tab-store" class="tab active" onclick="switchTab('store')">🏪 STORE</div>
        <div id="tab-profile" class="tab" onclick="openProfile()">👤 PROFILE</div>
    </div>

    <div id="store" class="content active">
        <div id="main-menu" class="grid">
            <div class="card" onclick="loadGal('tshirts/printed/', 'Printed T-Shirts')">
                👕 T-Shirts <span class="sub-text">Polo / Printed / Casual</span>
            </div>
            <div class="card" onclick="loadGal('shirt/casual/', 'Casual Shirts')">
                👔 Shirts <span class="sub-text">Formal / Casual / Slim</span>
            </div>
            <div class="card" onclick="loadGal('pants/jeans/', 'Jeans Pants')">
                👖 Pants <span class="sub-text">Jeans / Gabardine / Chino</span>
            </div>
            <div class="card" onclick="loadGal('panjabi/easy/', 'Panjabi')">
                🕌 Panjabi <span class="sub-text">Cotton / Silk / Embroidered</span>
            </div>
        </div>

        <div id="gallery" style="display:none;">
            <button onclick="goBack()" style="color:#38bdf8; background:none; border:none; margin-bottom:15px; cursor:pointer;">⬅️ Back to Menu</button>
            <div class="grid" id="gal-container"></div>
        </div>
    </div>

    <div id="profile" class="content">
        <div style="background:#1e293b; padding:15px; border-radius:12px; border: 1px solid #334155; margin-bottom:15px;">
            <h3 id="u-name">Guest</h3>
            <p id="u-id" style="color:#38bdf8;">#000000</p>
        </div>

        <h4>🛒 Order List</h4>
        <div id="cart-items"></div>

        <div id="bill-box" style="display:none;" class="bill-box">
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>Sub-total:</span> <span id="b-sub">$0</span></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>Delivery:</span> <span>$2</span></div>
            <div style="display:flex; justify-content:space-between; font-weight:bold; border-top:1px solid #334155; padding-top:10px;"><span>Total:</span> <span id="b-total">$0</span></div>
            <button class="btn-full" style="background:#22c55e;" onclick="checkout()">Place Order</button>
        </div>

        <div style="margin-top: 30px;">
            <p style="text-align:center; font-size:12px; color:#94a3b8;">Want some fun?</p>
            <a href="https://www.fiverr.com/users/mr_zoha" target="_blank" style="text-decoration:none;">
                <button class="btn-full" style="background:#ff9800;">🎮 Play Game (Fiverr)</button>
            </a>
        </div>
    </div>

    <div id="details" class="details-page">
        <button onclick="closeDetails()" style="color:#38bdf8; background:none; border:none; font-size: 18px;">❌ Close</button>
        <img id="d-img" src="" style="width:100%; border-radius:12px; height:250px; object-fit:cover; margin-top:15px;">
        <h2 id="d-title">Product</h2>
        <p style="color:#38bdf8; font-size:24px; font-weight:bold; margin:10px 0;">$15.00</p>
        
        <div style="background:#1e293b; padding:15px; border-radius:10px;">
            <label>Size:</label>
            <select id="s-size" style="width:100%; padding:10px; background:#0f172a; color:white; border:1px solid #334155; border-radius:5px; margin:5px 0 15px 0;">
                <option>M</option><option>L</option><option>XL</option><option>XXL</option>
            </select>
            <label>Color:</label>
            <select id="s-color" style="width:100%; padding:10px; background:#0f172a; color:white; border:1px solid #334155; border-radius:5px; margin:5px 0;">
                <option>Black</option><option>White</option><option>Navy</option>
            </select>
        </div>
        <button class="btn-full" style="background:#38bdf8;" onclick="addToCart()">🛒 Add to Profile Cart</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const IMG_URL = "https://raw.githubusercontent.com/Zoha742/eshopbot/main/products/";
        let cart = [];
        let current = {};

        function switchTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('tab-' + id).classList.add('active');
        }

        function openProfile() {
            switchTab('profile');
            renderCart();
        }

        function loadGal(path, title) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('gallery').style.display = 'block';
            const con = document.getElementById('gal-container');
            con.innerHTML = 'Loading...';
            setTimeout(() => {
                con.innerHTML = '';
                for(let i=1; i<=6; i++) {
                    const img = `${IMG_URL}${path}${i}.jpg`;
                    con.innerHTML += `
                    <div class="prod-card" onclick="openDet('${img}', '${title} #${i}')">
                        <img src="${img}" onerror="this.src='https://via.placeholder.com/150'">
                        <div style="padding:10px; text-align:center; font-weight:bold;">$15.00</div>
                    </div>`;
                }
            }, 300);
        }

        function openDet(img, title) {
            current = { img, title, price: 15 };
            document.getElementById('d-img').src = img;
            document.getElementById('d-title').innerText = title;
            document.getElementById('details').style.display = 'block';
        }

        function closeDetails() { document.getElementById('details').style.display = 'none'; }

        function addToCart() {
            const size = document.getElementById('s-size').value;
            const color = document.getElementById('s-color').value;
            cart.push({...current, size, color, id: Date.now()});
            tg.showPopup({ message: "Added to cart!" });
            closeDetails();
        }

        function renderCart() {
            const list = document.getElementById('cart-items');
            const bill = document.getElementById('bill-box');
            if(cart.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#64748b;">Cart is empty.</p>';
                bill.style.display = 'none';
                return;
            }
            list.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div>
                        <b>${item.title}</b><br>
                        <small>${item.size} / ${item.color} - $15</small>
                    </div>
                    <button class="del-btn" onclick="removeItem(${index})">Delete</button>
                </div>
            `).join('');
            const sub = cart.length * 15;
            document.getElementById('b-sub').innerText = '$' + sub;
            document.getElementById('b-total').innerText = '$' + (sub + 2);
            bill.style.display = 'block';
        }

        function removeItem(idx) {
            cart.splice(idx, 1);
            renderCart();
        }

        function goBack() {
            document.getElementById('main-menu').style.display = 'grid';
            document.getElementById('gallery').style.display = 'none';
        }

        function checkout() {
            tg.showPopup({ title: 'Order Record', message: 'Billing generated! Pay $'+(cart.length*15+2)+'?', buttons: [{text: 'Pay Now', type: 'ok'}, {text: 'Cancel', type: 'destructive'}] });
        }

        const user = tg.initDataUnsafe.user;
        if(user) {
            document.getElementById('u-name').innerText = user.first_name + ' ' + (user.last_name || '');
            document.getElementById('u-id').innerText = "#" + user.id;
        }
    </script>
</body>
</html>
