<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eShop365 Professional</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e293b; display: flex; border-top: 1px solid #334155; height: 75px; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #94a3b8; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        .container { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 95px; }
        .page { display: none; }
        .page.active { display: block; }

        /* Sections */
        .header { display: flex; align-items: center; gap: 8px; color: var(--primary); font-size: 13px; font-weight: 800; margin: 20px 0 10px; border-left: 3px solid var(--primary); padding-left: 8px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--card); padding: 15px 10px; border-radius: 12px; text-align: center; border: 1px solid #334155; font-weight: 600; font-size: 12px; }

        /* Dashboard Look */
        .profile-area { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); border-radius: 20px; padding: 25px; text-align: center; border: 1px solid #334155; }
        .avatar { width: 85px; height: 85px; background: var(--primary); border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; border: 3px solid #1e293b; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .stats { display: flex; justify-content: space-around; margin-top: 20px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; }
        .stat-item b { display: block; font-size: 16px; color: var(--primary); }
        .stat-item span { font-size: 10px; color: #94a3b8; }

        /* Address Box */
        .addr-box { background: var(--card); padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid #334155; }
        .input { width: 100%; padding: 12px; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 10px; margin-top: 8px; box-sizing: border-box; }
        .hidden { display: none; }

        /* Modal */
        #modal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .m-img { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        .m-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .m-info { background: var(--card); padding: 25px; border-radius: 25px 25px 0 0; margin-top: -25px; }
        .btn-confirm { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 16px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
