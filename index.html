<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eShop365 Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin:0; padding:0; }
        .container { padding:15px; padding-bottom:100px; }
        .page { display:none; } .page.active { display:block; }
        
        /* Category Grid */
        .section-h { color:var(--primary); font-size:12px; font-weight:800; margin:20px 0 10px; border-left:3px solid var(--primary); padding-left:8px; text-transform:uppercase; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .btn-cat { background:var(--card); padding:12px; border-radius:10px; text-align:center; border:1px solid #334155; font-size:12px; font-weight:600; cursor:pointer; }

        /* Premium Product View (White Card Style) */
        .product-list-grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; padding:10px 0; }
        .p-card-white { background: #ffffff; border-radius:12px; overflow:hidden; color: #333; position:relative; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .p-img-box { width:100%; height:160px; background:#f3f4f6; display:flex; align-items:center; justify-content:center; }
        .p-img-box img { max-width:100%; max-height:100%; object-fit: cover; }
        .p-details { padding:10px; text-align:center; }
        .p-name { font-size:13px; font-weight:700; margin:5px 0; color: #1e293b; }
        .p-price { font-size:14px; font-weight:800; color: #f59e0b; margin-bottom:8px; }
        .btn-view { background: var(--primary); color: white; border: none; width: 100%; padding: 8px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* Detail Modal Styling */
        #modal { position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; display:none; flex-direction:column; }
        .modal-content { background: var(--card); margin-top: auto; padding: 25px; border-radius: 25px 25px 0 0; }
        .status-tag { display:inline-block; padding:3px 10px; border-radius:20px; font-size:10px; font-weight:bold; margin-bottom:10px; }
        .status-available { background: #22c55e; color: white; }
        .status-sold { background: #ef4444; color: white; }
        .size-box { display:flex; gap:10px; margin:15px 0; }
        .size-btn { border: 1px solid #334155; padding: 8px 15px; border-radius: 8px; cursor: pointer; background: #0f172a; color: white; }
        .size-btn.active { border-color: var(--primary); color: var(--primary); }

        /* Profile Style */
        .profile-list { background:var(--card); border-radius:12px; margin-top:15px; }
        .list-item { display:flex; align-items:center; padding:15px; border-bottom:1px solid #334155; gap:15px; cursor:pointer; }
        .list-item i { width: 20px; color: #94a3b8; }

        /* Nav */
        .bottom-nav { position:fixed; bottom:0; width:100%; background:#1e293b; display:flex; height:70px; border-top:1px solid #334155; z-index:1000; }
        .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#94a3b8; font-size:11px; }
        .nav-item.active { color:var(--primary); }
    </style>
</head>
<body>

    <div class="container">
        <div id="p-shop" class="page active">
            <div class="section-h"><i class="fas fa-bolt"></i> HOT DEALS</div>
            <div class="grid">
                <div class="btn-cat" onclick="openList('hotdeals/summer/', 'Summer Offer')">☀️ Summer Offer</div>
                <div class="btn-cat" onclick="openList('hotdeals/sale/', 'Big Sale')">🎁 Big Sale</div>
            </div>

            <div class="section-h"><i class="fas fa-tshirt"></i> T-SHIRTS</div>
            <div class="grid">
                <div class="btn-cat" onclick="openList('tshirts/printed/', 'Printed T-shirt')">Printed</div>
                <div class="btn-cat" onclick="openList('tshirts/polo/', 'Polo T-shirt')">Polo</div>
            </div>
        </div>

        <div id="p-list" class="page">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
                <i class="fas fa-arrow-left" onclick="nav('shop')"></i>
                <h3 id="list-title" style="margin:0; font-size:16px;">Collection</h3>
            </div>
            <div id="product-grid" class="product-list-grid"></div>
        </div>

        <div id="p-profile" class="page">
            <div style="text-align:center; padding:20px;">
                <div style="width:70px; height:70px; background:var(--primary); border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:bold;" id="u-pic">?</div>
                <h3 id="u-name" style="margin:0;">User</h3>
                <p id="u-id" style="font-size:12px; color:var(--primary);">#ID</p>
            </div>
            <div class="profile-list">
                <div class="list-item"><i class="fas fa-box"></i> <span>My Orders</span></div>
                <div class="list-item"><i class="fas fa-heart"></i> <span>Wishlist</span></div>
                <div class="list-item"><i class="fas fa-shield-alt"></i> <span>Policies</span></div>
                <div class="list-item"><i class="fas fa-headset"></i> <span>Chat with us</span></div>
            </div>
        </div>
    </div>

    <div id="modal">
        <div style="flex:1; display:flex; align-items:center; justify-content:center; position:relative;">
            <i class="fas fa-times" onclick="closeModal()" style="position:absolute; top:20px; right:20px; font-size:24px; color:white; background:rgba(0,0,0,0.5); padding:10px; border-radius:50%;"></i>
            <img id="m-img" src="" style="max-width:100%; max-height:80%; object-fit:contain;">
        </div>
        <div class="modal-content">
            <div id="m-status" class="status-tag status-available">Available</div>
            <h2 id="m-title" style="margin:0; color:white;">Product Title</h2>
            <p id="m-price" style="color:var(--primary); font-size:22px; font-weight:800; margin:10px 0;">$15.00</p>
            
            <p style="font-size:12px; color:#94a3b8; margin:0;">Select Size:</p>
            <div class="size-box">
                <div class="size-btn" onclick="setSize(this, 'M')">M</div>
                <div class="size-btn active" onclick="setSize(this, 'L')">L</div>
                <div class="size-btn" onclick="setSize(this, 'XL')">XL</div>
            </div>

            <button class="btn-buy" onclick="addToCart()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:bold; font-size:16px;">
                <i class="fas fa-cart-plus"></i> ADD TO CART
            </button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="nav('shop')"><i class="fas fa-th-large"></i>Menu</div>
        <div class="nav-item" onclick="tg.showAlert('Cart is empty')"><i class="fas fa-shopping-basket"></i>Cart</div>
        <div class="nav-item" onclick="nav('profile')"><i class="fas fa-user-circle"></i>Profile</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const BASE_IMG = "https://raw.githubusercontent.com/Zoha742/eshopbot/main/products/";
        let currentProduct = {};

        function nav(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(ni => ni.classList.remove('active'));
            document.getElementById('p-' + p).classList.add('active');
            if(p === 'shop') document.querySelectorAll('.nav-item')[0].classList.add('active');
            if(p === 'profile') document.querySelectorAll('.nav-item')[2].classList.add('active');
        }

        // প্রোডাক্ট লিস্ট গ্রিড ভিউ
        function openList(path, title) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            document.getElementById('list-title').innerText = title;
            
            for(let i=1; i<=6; i++) {
                const imgUrl = BASE_IMG + path + i + '.jpg';
                grid.innerHTML += `
                    <div class="p-card-white">
                        <div class="p-img-box">
                            <img src="${imgUrl}" onerror="this.parentElement.parentElement.style.display='none'">
                        </div>
                        <div class="p-details">
                            <div class="p-name">${title} #${i}</div>
                            <div class="p-price">৳৮৮০</div>
                            <button class="btn-view" onclick="openDetail('${imgUrl}', '${title} #${i}')">
                                <i class="fas fa-search"></i> View & Buy
                            </button>
                        </div>
                    </div>`;
            }
            nav('list');
        }

        // ডিটেইল ভিউ (Size, Available/Sold)
        function openDetail(img, title) {
            currentProduct = { img, title, size: 'L' };
            document.getElementById('m-img').src = img;
            document.getElementById('m-title').innerText = title;
            document.getElementById('modal').style.display = 'flex';
            
            // Random Availability Demo
            const isSold = Math.random() > 0.8;
            const status = document.getElementById('m-status');
            status.innerText = isSold ? "Sold Out" : "Available";
            status.className = isSold ? "status-tag status-sold" : "status-tag status-available";
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function setSize(el, s) {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            currentProduct.size = s;
        }

        function addToCart() {
            tg.showPopup({ message: `${currentProduct.title} (Size: ${currentProduct.size}) added to cart!` });
            closeModal();
        }

        const user = tg.initDataUnsafe.user;
        if(user) {
            document.getElementById('u-name').innerText = user.first_name;
            document.getElementById('u-id').innerText = "#" + user.id;
            document.getElementById('u-pic').innerText = user.first_name[0];
        }
    </script>
</body>
</html>
