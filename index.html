<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eShop365 App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; padding: 0; }
        .nav { display: flex; background: #1e293b; position: sticky; top: 0; z-index: 10; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #94a3b8; }
        .tab.active { color: #38bdf8; border-bottom: 3px solid #38bdf8; }
        .section { display: none; padding: 15px; }
        .section.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid #334155; color: white; text-align: center; cursor: pointer; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .card { background: #1e293b; border-radius: 8px; overflow: hidden; border: 1px solid #334155; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .price { color: #38bdf8; padding: 5px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav">
        <div class="tab active" onclick="tab('shop')">STORE</div>
        <div class="tab" onclick="tab('profile')">PROFILE</div>
    </div>

    <div id="shop" class="section active">
        <div id="menu">
            <div class="grid">
                <div class="btn" onclick="load('tshirts/printed/', 'T-Shirts')">👕 T-Shirts</div>
                <div class="btn" onclick="load('shirt/casual/', 'Shirts')">👔 Shirts</div>
                <div class="btn" onclick="load('pants/jeans/', 'Pants')">👖 Pants</div>
                <div class="btn" onclick="load('panjabi/easy/', 'Panjabi')">🕌 Panjabi</div>
            </div>
        </div>
        <div id="gallery" style="display:none;">
            <button onclick="back()" style="color:#38bdf8; background:none; border:none; margin-bottom:10px;">⬅️ Back to Menu</button>
            <h3 id="title"></h3>
            <div class="product-grid" id="container"></div>
        </div>
    </div>

    <div id="profile" class="section">
        <div style="background:#1e293b; padding:20px; border-radius:10px;">
            <h3>User: <span id="u-name">Guest</span></h3>
            <p>ID: <span id="u-id" style="color:#38bdf8;">#000000</span></p>
            <hr border="0.1" color="#334155">
            <button style="width:100%; padding:10px; background:#0088cc; color:white; border:none; border-radius:5px; margin-top:10px;" onclick="msg('Payment system starting...')">TON Wallet Pay</button>
            <button style="width:100%; padding:10px; background:#22c55e; color:white; border:none; border-radius:5px; margin-top:10px;" onclick="msg('Local payment ready!')">Bkash/Nagad</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const IMG_BASE = "https://raw.githubusercontent.com/Zoha742/eshopbot/main/products/";

        function tab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function load(path, title) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('gallery').style.display = 'block';
            document.getElementById('title').innerText = title;
            const con = document.getElementById('container');
            con.innerHTML = '';
            for(let i=1; i<=6; i++) {
                con.innerHTML += `<div class="card"><img src="${IMG_BASE}${path}${i}.jpg" onerror="this.src='https://via.placeholder.com/150'"><div class="price">$15.00</div></div>`;
            }
        }

        function back() {
            document.getElementById('menu').style.display = 'grid';
            document.getElementById('gallery').style.display = 'none';
        }

        function msg(t) { tg.showPopup({ message: t }); }

        const user = tg.initDataUnsafe.user;
        if(user) {
            document.getElementById('u-name').innerText = user.first_name;
            document.getElementById('u-id').innerText = "#" + user.id.toString().slice(-6);
        }
    </script>
</body>
</html>
