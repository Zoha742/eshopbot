<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eShop365 Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; margin: 0; padding: 0; }
        .tabs { display: flex; background: #1e293b; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #94a3b8; }
        .tab.active { color: #38bdf8; border-bottom: 3px solid #38bdf8; }
        .content { display: none; padding: 15px; }
        .content.active { display: block; }
        
        /* Category Styles */
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .cat-card { background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #334155; cursor: pointer; }
        .cat-card:active { transform: scale(0.95); }
        
        /* Gallery Styles */
        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .prod-card { background: #1e293b; border-radius: 10px; overflow: hidden; border: 1px solid #334155; position: relative; }
        .prod-card img { width: 100%; height: 160px; object-fit: cover; }
        .actions { padding: 10px; display: flex; justify-content: space-around; background: #1e293b; }
        .btn-sm { background: none; border: 1px solid #334155; color: white; padding: 5px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        
        /* Profile Styles */
        .box { background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        .uid { background: #334155; padding: 5px 10px; border-radius: 6px; color: #38bdf8; font-family: monospace; }
        .btn-full { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" onclick="openTab('store')">🏪 STORE</div>
        <div class="tab" onclick="openTab('profile')">👤 PROFILE</div>
    </div>

    <div id="store" class="content active">
        <div id="cat-menu">
            <h4>Select Category</h4>
            <div class="cat-grid">
                <div class="cat-card" onclick="loadGal('tshirts/printed/', 'T-Shirts')">👕 T-Shirts</div>
                <div class="cat-card" onclick="loadGal('shirt/casual/', 'Shirts')">👔 Shirts</div>
                <div class="cat-card" onclick="loadGal('pants/jeans/', 'Pants')">👖 Pants</div>
                <div class="cat-card" onclick="loadGal('panjabi/easy/', 'Panjabi')">🕌 Panjabi</div>
                <div class="cat-card" onclick="loadGal('shirt/formal/', 'Formal')">💼 Formal</div>
                <div class="cat-card" onclick="loadGal('accessories/belt/', 'Accessories')">⌚ Accessories</div>
            </div>
        </div>

        <div id="gallery" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h4 id="g-title"></h4>
                <button onclick="back()" style="color:#38bdf8; background:none; border:none; cursor:pointer;">⬅️ Back</button>
            </div>
            <div class="gallery-grid" id="g-container"></div>
        </div>
    </div>

    <div id="profile" class="content">
        <div class="box">
            <h3>User: <span id="u-name">Guest</span></h3>
            <p>User ID: <span id="u-id" class="uid">#000000</span></p>
        </div>
        <div class="box">
            <h4>💳 Wallet & Payments</h4>
            <button class="btn-full" style="background:#0088cc; color:white;" onclick="alertMsg('Connecting to TON Wallet...')">Connect TON Wallet</button>
            <button class="btn-full" style="background:#22c55e; color:white;" onclick="alertMsg('Local Payment (Bkash/Nagad) Selected')">Local Payment</button>
        </div>
        <div class="box">
            <h4>📦 Order Summary</h4>
            <button class="btn-full" style="background:#6366f1; color:white;" onclick="alertMsg('Generating order invoice... Please wait.')">Generate Bill</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const IMG_URL = "https://raw.githubusercontent.com/Zoha742/eshopbot/main/products/";

        function openTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function loadGal(path, title) {
            document.getElementById('cat-menu').style.display = 'none';
            document.getElementById('gallery').style.display = 'block';
            document.getElementById('g-title').innerText = title;
            const container = document.getElementById('g-container');
            container.innerHTML = '';
            
            for(let i=1; i<=6; i++) {
                container.innerHTML += `
                <div class="prod-card">
                    <img src="${IMG_URL}${path}${i}.jpg" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="actions">
                        <button class="btn-sm" onclick="alertMsg('❤️ Added to Favorites')">❤️</button>
                        <button class="btn-sm" onclick="alertMsg('🛒 Added to Cart')">🛒</button>
                    </div>
                </div>`;
            }
        }

        function back() {
            document.getElementById('cat-menu').style.display = 'grid';
            document.getElementById('gallery').style.display = 'none';
        }

        function alertMsg(txt) {
            tg.showPopup({ message: txt });
        }

        const user = tg.initDataUnsafe.user;
        if(user) {
            document.getElementById('u-name').innerText = user.first_name;
            document.getElementById('u-id').innerText = "#" + user.id.toString().slice(-6);
        }
    </script>
</body>
</html>
