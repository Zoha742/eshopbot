<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eShop365 Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Main Navigation (Bottom Bar) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); display: flex; border-top: 1px solid #334155; z-index: 1000; height: 65px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #94a3b8; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; margin-bottom: 3px; }

        .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
        .page { display: none; }
        .page.active { display: block; }

        /* Grid for Categories (7 Main Categories) */
        .section-title { color: var(--primary); margin: 15px 0 10px 0; font-size: 14px; font-weight: bold; border-left: 4px solid var(--primary); padding-left: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .cat-card { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #334155; font-weight: 600; font-size: 13px; }

        /* Extra Feature Buttons (Fiverr & AI Support) */
        .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-extra { padding: 12px; border-radius: 10px; text-decoration: none; color: white; text-align: center; font-size: 13px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .fiverr-btn { background: #1dbf73; }
        .ai-btn { background: #8b5cf6; }

        /* Modal for Product View */
        #product-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="content-area">
        <div id="p-store" class="page active">
            <div class="section-title">👕 T-SHIRTS</div>
            <div class="grid">
                <div class="cat-card" onclick="load('tshirts/printed/', 'Printed T-shirt')">Printed</div>
                <div class="cat-card" onclick="load('tshirts/polo/', 'Polo T-shirt')">Polo</div>
            </div>

            <div class="section-title">👔 SHIRTS</div>
            <div class="grid">
                <div class="cat-card" onclick="load('shirt/formal/', 'Formal Shirt')">Formal</div>
                <div class="cat-card" onclick="load('shirt/casual/', 'Casual Shirt')">Casual</div>
            </div>

            <div class="section-title">👖 PANTS</div>
            <div class="grid">
                <div class="cat-card" onclick="load('pants/jeans/', 'Jeans Pant')">Jeans</div>
                <div class="cat-card" onclick="load('pants/formal/', 'Formal Pant')">Formal</div>
            </div>

            <div class="section-title">🕌 PANJABI</div>
            <div class="grid">
                <div class="cat-card" onclick="load('panjabi/easy/', 'Easy Panjabi')">Easy</div>
                <div class="cat-card" onclick="load('panjabi/kabli/', 'Kabli Set')">Kabli</div>
            </div>

            <div class="section-title">👶 JUNIOR</div>
            <div class="grid">
                <div class="cat-card" onclick="load('junior/boys/', 'Boys Wear')">Boys</div>
                <div class="cat-card" onclick="load('junior/girls/', 'Girls Wear')">Girls</div>
            </div>

            <div class="section-title">🔥 DEALS & ACCESSORIES</div>
            <div class="grid">
                <div class="cat-card" onclick="load('hotdeals/', 'Hot Deals')">Hot Deals</div>
                <div class="cat-card" onclick="load('accessories/', 'Accessories')">All Accs</div>
            </div>

            <div class="section-title">🚀 QUICK SERVICES</div>
            <div class="feature-grid">
                <a href="https://www.fiverr.com/zoha742" target="_blank" class="btn-extra fiverr-btn">
                    <i class="fab fa-fiverr"></i> Fiverr Shop
                </a>
                <div class="btn-extra ai-btn" onclick="tg.showPopup({message: 'AI Support is coming soon...'})">
                    <i class="fas fa-robot"></i> AI Support
                </div>
            </div>
        </div>

        <div id="p-order" class="page">
            <div class="section-title">MY ORDERS</div>
            <div id="order-list" style="text-align: center; margin-top: 50px; color: #94a3b8;">
                No active orders found.
            </div>
        </div>

        <div id="p-profile" class="page">
            <div class="section-title">USER PROFILE</div>
            <div style="background:var(--card); padding:20px; border-radius:15px; text-align:center;">
                <h3 id="u-name">Loading...</h3>
                <p id="u-id">#ID</p>
                <button onclick="tg.close()" style="background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 8px; margin-top: 15px;">Exit App</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="nav('store', this)"><i class="fas fa-store"></i>Store</div>
        <div class="nav-item" onclick="nav('order', this)"><i class="fas fa-shopping-basket"></i>Orders</div>
        <div class="nav-item" onclick="nav('profile', this)"><i class="fas fa-user-circle"></i>Profile</div>
    </div>

    <div id="product-modal">
        <button onclick="closeMod()" style="float:right; background:none; border:none; color:white; font-size:24px;"><i class="fas fa-times"></i></button>
        <div id="modal-content" class="grid" style="margin-top: 40px;"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const IMG_URL = "https://raw.githubusercontent.com/Zoha742/eshopbot/main/products/";

        function nav(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + pageId).classList.add('active');
            el.classList.add('active');
        }

        function load(path, name) {
            const modal = document.getElementById('product-modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = '';
            modal.style.display = 'block';
            
            // Loading 6 items per sub-category as per your folder
            for(let i=1; i<=6; i++) {
                content.innerHTML += `
                    <div style="background:var(--card); border-radius:10px; overflow:hidden;">
                        <img src="${IMG_URL}${path}${i}.jpg" style="width:100%; height:120px; object-fit:cover;">
                        <div style="padding:10px; font-size:12px;">${name} #${i}</div>
                    </div>`;
            }
        }

        function closeMod() { document.getElementById('product-modal').style.display = 'none'; }

        // User Data
        const user = tg.initDataUnsafe.user;
        if(user) {
            document.getElementById('u-name').innerText = user.first_name + " " + (user.last_name || "");
            document.getElementById('u-id').innerText = "@" + (user.username || user.id);
        }
    </script>
</body>
</html>
