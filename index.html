<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eShop365 Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); display: flex; border-top: 1px solid #334155; z-index: 1000; height: 65px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #94a3b8; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; margin-bottom: 4px; }

        .main-container { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 85px; }
        .content { display: none; }
        .content.active { display: block; }

        /* Grid System */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .cat-card { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
        .section-title { color: var(--primary); margin: 20px 0 10px 0; font-weight: bold; border-left: 4px solid var(--primary); padding-left: 10px; font-size: 14px; }

        /* Gallery */
        #gallery-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .p-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #334155; }
        .p-card img { width: 100%; height: 160px; object-fit: cover; }

        /* Details & Size */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; display: none; padding: 20px; box-sizing: border-box; }
        .size-group { display: flex; gap: 8px; margin: 15px 0; }
        .size-chip { padding: 10px 15px; background: #334155; border-radius: 8px; cursor: pointer; font-weight: bold; border: 2px solid transparent; }
        .size-chip.active { border-color: var(--primary); color: var(--primary); }

        .input { width: 100%; padding: 14px; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 12px; margin-top: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 15px; }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="p-store" class="content active">
            <div class="section-title">👕 T-SHIRTS</div>
            <div class="grid">
                <div class="cat-card" onclick="load('tshirts/printed/', 'Printed T-shirt')">Printed</div>
                <div class="cat-card" onclick="load('tshirts/polo/', 'Polo T-shirt')">Polo</div>
            </div>
            <div class="section-title">👔 SHIRTS</div>
            <div class="grid">
                <div class="cat-card" onclick="load('shirt/formal/', 'Formal Shirt')">Formal</div>
                <div class="cat-card" onclick="load('shirt/casual/', 'Casual Shirt')">Casual</div>
            </div>
            <div class="section-title">👖 PANTS</div>
            <div class="grid">
                <div class="cat-card" onclick="load('pants/jeans/', 'Jeans Pant')">Jeans</div>
                <div class="cat-card" onclick="load('pants/formal/', 'Formal Pant')">Formal</div>
            </div>
        </div>

        <div id="p-profile" class="content">
            <div style="background:var(--card); padding:20px; border-radius:15px; text-align:center; margin-bottom:20px;">
                <h3 id="u-name">Welcome</h3>
                <small id="u-id" style="color:var(--primary);">#ID</small>
            </div>

            <div id="addr-section">
                <div class="section-title">Shipping Address</div>
                <div id="addr-form" style="background:var(--card); padding:15px; border-radius:15px;">
                    <input type="text" id="s-name" class="input" placeholder="Full Name">
                    <textarea id="s-addr" class="input" placeholder="House, Road, City..." style="height:70px;"></textarea>
                    <button class="btn" style="background:var(--primary); color:white;" onclick="saveAddr()">Save Address</button>
                </div>
                <div id="addr-display" style="display:none; background:var(--card); padding:15px; border-radius:15px;">
                    <p id="saved-info" style="margin:0; font-size:14px;"></p>
                    <button onclick="editAddr()" style="background:none; border:none; color:var(--primary); padding-top:10px; cursor:pointer;">Edit Address</button>
                </div>
            </div>

            <div class="section-title">My Orders (Recorded)</div>
            <div id="cart-items"></div>
            <div id="order-footer" style="display:none; margin-top:20px;">
                <h3 style="text-align:right;">Total: <span id="total-price" style="color:var(--primary);">$0</span></h3>
                <button class="btn" style="background:#22c55e; color:white;" onclick="confirmOrder()">Confirm All Orders</button>
            </div>
        </div>
    </div>

    <div id="gallery-view">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
            <button onclick="closeGal()" style="background:none; border:none; color:var(--primary); font-size:24px;"><i class="fas fa-chevron-left"></i></button>
            <h3 id="gal-title" style="margin:0;">Products</h3>
        </div>
        <div class="grid" id="p-list"></div>
    </div>

    <div id="modal" class="modal">
        <button onclick="closeModal()" style="float:right; color:white; background:none; border:none; font-size:20px;"><i class="fas fa-times"></i></button>
        <img id="m-img" src="" style="width:100%; border-radius:15px; margin-top:10px;">
        <h2 id="m-title" style="margin:15px 0 5px 0;">Product</h2>
        <p style="font-size:22px; color:var(--primary); font-weight:bold; margin:0;">$15.00</p>
        
        <p style="margin-top:20px; font-weight:bold;">Select Size:</p>
        <div class="size-group">
            <div class="size-chip" onclick="setSize('M', this)">M</div>
            <div class="size-chip active" onclick="setSize('L', this)">L</div>
            <div class="size-chip" onclick="setSize('XL', this)">XL</div>
            <div class="size-chip" onclick="setSize('XXL', this)">XXL</div>
        </div>

        <button class="btn" style="background:var(--primary); color:white;" onclick="addCart()">Add to Record</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="nav('store', this)"><i class="fas fa-store"></i>Store</div>
        <div class="nav-item" onclick="nav('profile', this)"><i class="fas fa-shopping-basket"></i>Record</div>
        <a href="https://fiverr.com/yourlink" class="nav-item"><i class="fab fa-fiverr"></i>Fiverr</a>
        <div class="nav-item" onclick="tg.showPopup({message: 'Contact AI Support via @eShop365_bot'})"><i class="fas fa-headset"></i>Support</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const URL = "https://raw.githubusercontent.com/Zoha742/eshopbot/main/products/";
        let cart = JSON.parse(localStorage.getItem('eshop_cart')) || [];
        let sz = 'L'; let cur = {};

        function nav(p, el) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + p).classList.add('active');
            el.classList.add('active');
            if(p === 'profile') render();
        }

        function load(path, name) {
            const list = document.getElementById('p-list');
            list.innerHTML = '';
            document.getElementById('gallery-view').style.display = 'block';
            document.getElementById('gal-title').innerText = name;
            for(let i=1; i<=6; i++) {
                const img = `${URL}${path}${i}.jpg`;
                list.innerHTML += `<div class="p-card" onclick="openMod('${img}', '${name} #${i}')">
                    <img src="${img}" onerror="this.src='https://via.placeholder.com/150'">
                    <div style="padding:10px; text-align:center;"><b>$15.00</b></div>
                </div>`;
            }
        }

        function closeGal() { document.getElementById('gallery-view').style.display = 'none'; }

        function openMod(img, title) {
            cur = { img, title, price: 15 };
            document.getElementById('m-img').src = img;
            document.getElementById('m-title').innerText = title;
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function setSize(s, el) {
            sz = s;
            document.querySelectorAll('.size-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function addCart() {
            cart.push({...cur, size: sz});
            localStorage.setItem('eshop_cart', JSON.stringify(cart));
            tg.showPopup({ message: "Added to your order record!" });
            closeModal();
        }

        function render() {
            const list = document.getElementById('cart-items');
            if(cart.length === 0) { list.innerHTML = "No items recorded."; document.getElementById('order-footer').style.display = 'none'; return; }
            list.innerHTML = cart.map((i, idx) => `
                <div style="background:var(--card); padding:15px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${i.title}</b><br><small>Size: ${i.size} | Price: $${i.price}</small></div>
                    <i class="fas fa-trash" style="color:#ef4444;" onclick="delItem(${idx})"></i>
                </div>`).join('');
            document.getElementById('total-price').innerText = '$' + (cart.length * 15);
            document.getElementById('order-footer').style.display = 'block';
        }

        function delItem(idx) { cart.splice(idx, 1); localStorage.setItem('eshop_cart', JSON.stringify(cart)); render(); }

        function saveAddr() {
            const n = document.getElementById('s-name').value;
            const a = document.getElementById('s-addr').value;
            if(!n || !a) return tg.showAlert("Please fill address!");
            localStorage.setItem('u_name', n); localStorage.setItem('u_addr', a);
            checkAddr();
        }

        function checkAddr() {
            const n = localStorage.getItem('u_name');
            if(n) {
                document.getElementById('addr-form').style.display = 'none';
                document.getElementById('addr-display').style.display = 'block';
                document.getElementById('saved-info').innerText = `${n}\n${localStorage.getItem('u_addr')}`;
            }
        }

        function editAddr() {
            document.getElementById('addr-form').style.display = 'block';
            document.getElementById('addr-display').style.display = 'none';
        }

        function confirmOrder() {
            const n = localStorage.getItem('u_name');
            if(!n) return tg.showAlert("Please save address in Profile first!");
            const data = { user: tg.initDataUnsafe.user, items: cart, addr: {name: n, a: localStorage.getItem('u_addr')}, total: cart.length*15 };
            tg.sendData(JSON.stringify(data));
            cart = []; localStorage.removeItem('eshop_cart');
            tg.close();
        }

        // Init
        const user = tg.initDataUnsafe.user;
        if(user) { 
            document.getElementById('u-name').innerText = user.first_name; 
            document.getElementById('u-id').innerText = "#" + user.id; 
        }
        checkAddr();
    </script>
</body>
</html>
