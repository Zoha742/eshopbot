<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eShop365 Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin:0; padding:0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .container { padding:15px; padding-bottom:100px; max-width: 600px; margin: 0 auto; }
        .page { display:none; } .page.active { display:block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Headers & Grid */
        .section-h { display:flex; align-items:center; gap:8px; color:var(--primary); font-size:12px; font-weight:800; margin:20px 0 10px; border-left:3px solid var(--primary); padding-left:8px; text-transform:uppercase; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .btn-cat { background:var(--card); padding:14px; border-radius:12px; text-align:center; border:1px solid #334155; font-size:12px; font-weight:600; cursor:pointer; color: white; display:flex; align-items:center; justify-content:center; gap:5px; }

        /* Product Cards */
        .product-grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; padding:10px 0; }
        .p-card { background: #ffffff; border-radius:15px; overflow:hidden; color: #333; position:relative; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .p-img-box { width:100%; height:170px; background:#f3f4f6; display:flex; align-items:center; justify-content:center; overflow: hidden; }
        .p-img-box img { max-width:100%; max-height:100%; object-fit: contain; }
        .p-details { padding:12px; text-align:center; }
        .btn-view-buy { background: var(--primary); color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; }

        /* Order List UI (With Images) */
        .order-card { background:var(--card); padding:15px; border-radius:12px; margin-bottom:15px; border:1px solid #334155; }
        .order-item-img { width: 40px; height: 40px; border-radius: 5px; object-fit: cover; border: 1px solid #334155; }
        .status-tag { padding:4px 10px; border-radius:8px; font-size:10px; font-weight:bold; color: white; }

        /* Profile Header */
        .u-header { text-align:center; padding:25px 0; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); border-radius: 15px; margin-bottom: 20px; border: 1px solid #334155; }
        .profile-list { background:var(--card); border-radius:15px; border: 1px solid #334155; overflow: hidden; }
        .list-item { display:flex; align-items:center; padding:18px; border-bottom:1px solid #334155; gap:15px; cursor:pointer; }
        
        /* Address Box Hidden */
        #address-box { display: none; background: #0f172a; padding: 15px; border-radius: 12px; margin: 10px; border: 1px solid #334155; }
        .address-input { width: 100%; padding: 10px; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }

        /* Admin Dashboard */
        .admin-search { width: 100%; padding: 12px; background: var(--card); border: 2px solid var(--primary); color: white; border-radius: 10px; margin-bottom: 15px; outline: none; }
        .action-btns { display: flex; gap: 8px; margin-top: 10px; }
        .btn-status { flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; color: white; }

        /* Bottom Nav */
        .bottom-nav { position:fixed; bottom:0; width:100%; max-width: 600px; left: 50%; transform: translateX(-50%); background:#1e293b; display:flex; height:75px; border-top:1px solid #334155; z-index:1000; }
        .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#94a3b8; font-size:11px; cursor:pointer; }
        .nav-item.active { color:var(--primary); }
    </style>
</head>
<body>

    <div class="container">
        <div id="p-shop" class="page active">
            <div class="section-h"><i class="fas fa-tshirt"></i> T-SHIRTS</div>
            <div class="grid">
                <div class="btn-cat" onclick="openList('tshirts/printed/', 'Printed')">Printed</div>
                <div class="btn-cat" onclick="openList('tshirts/polo/', 'Polo')">Polo</div>
            </div>

            <div class="section-h"><i class="fas fa-vest"></i> PANTS</div>
            <div class="grid">
                <div class="btn-cat" onclick="openList('pants/gabardine/', 'Gabardine Pant')">👖 Gabardine Pant</div>
                <div class="btn-cat" onclick="openList('pants/jeans/', 'Jeans')">Jeans</div>
            </div>

            <div class="section-h"><i class="fas fa-belt"></i> ACCESSORIES</div>
            <div class="grid">
                <div class="btn-cat" onclick="openList('innerwear/', 'Innerwear')">🩲 Innerwear</div>
                <div class="btn-cat" onclick="openList('accessories/belt/', 'Leather Belts')">Belts</div>
            </div>
        </div>

        <div id="p-cart" class="page">
            <div class="section-h">YOUR CART</div>
            <div id="cart-items"></div>
            <div id="cart-summary" style="padding:20px;">
                <button class="btn-view-buy" style="height:50px; font-size:16px;" onclick="placeOrder()">CONFIRM ORDER</button>
            </div>
        </div>

        <div id="p-profile" class="page">
            <div class="u-header">
                <div style="width:70px; height:70px; background:var(--primary); border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:24px; color: white;" id="u-pic">?</div>
                <h3 id="u-name" style="margin:0;">User</h3>
                <p id="u-id" style="font-size:12px; color:var(--primary);">#ID</p>
            </div>
            <div class="profile-list">
                <div class="list-item" onclick="toggleAddressBox()"><i class="fas fa-map-marker-alt"></i> <span>Manage Address</span></div>
                <div id="address-box">
                    <textarea id="address-input" class="address-input" placeholder="Enter Full Address & Mobile Number"></textarea>
                    <button class="btn-view-buy" style="background:var(--success);" onclick="saveAddress()">Save Address</button>
                </div>
                <div class="list-item" onclick="nav('orders')"><i class="fas fa-box"></i> <span>My Orders</span></div>
                <div class="list-item" onclick="promptAdminLogin()" style="color:var(--warning); border-top:1px dashed #334155;"><i class="fas fa-user-shield"></i> <span>Admin Dashboard</span></div>
            </div>
        </div>

        <div id="p-orders" class="page">
            <div class="section-h">MY ORDER HISTORY</div>
            <div id="order-list-container"></div>
        </div>

        <div id="p-admin" class="page">
            <div class="section-h">ADMIN CONTROL</div>
            <input type="text" id="adminSearchInput" class="admin-search" placeholder="Search Order ID or Name..." oninput="searchOrders()">
            <div id="admin-order-list"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="nav('shop')"><i class="fas fa-store"></i>Menu</div>
        <div class="nav-item" onclick="nav('cart')"><i class="fas fa-shopping-basket"></i>Cart</div>
        <div class="nav-item" onclick="nav('profile')"><i class="fas fa-user-circle"></i>Profile</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let cart = JSON.parse(localStorage.getItem('eshop_cart')) || [];
        let orders = JSON.parse(localStorage.getItem('eshop_orders')) || [];

        function nav(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById('p-' + p).classList.add('active');
            if(p === 'orders') renderUserOrders();
            if(p === 'admin') renderAdminOrders();
        }

        // --- ORDER PLACEMENT (With Images) ---
        function placeOrder() {
            const addr = localStorage.getItem('user_address');
            if(!addr) { tg.showAlert("Please add address in Profile!"); return; }
            if(cart.length === 0) { tg.showAlert("Cart is empty!"); return; }

            const newOrder = {
                id: 'ORD' + Math.floor(1000 + Math.random() * 9000),
                items: [...cart],
                status: 'Pending',
                address: addr,
                userName: tg.initDataUnsafe.user?.first_name || "Guest User",
                date: new Date().toLocaleDateString()
            };

            orders.unshift(newOrder);
            localStorage.setItem('eshop_orders', JSON.stringify(orders));
            cart = [];
            localStorage.removeItem('eshop_cart');
            tg.showAlert("Order Placed: " + newOrder.id);
            nav('orders');
        }

        // --- USER VIEW: ORDER HISTORY (With Images) ---
        function renderUserOrders() {
            const container = document.getElementById('order-list-container');
            if(orders.length === 0) { container.innerHTML = '<p style="text-align:center; padding:20px;">No orders found.</p>'; return; }

            container.innerHTML = orders.map(o => `
                <div class="order-card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <b>#${o.id}</b>
                        <span class="status-tag" style="background:${getStatusColor(o.status)}">${o.status}</span>
                    </div>
                    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;">
                        ${o.items.map(item => `
                            <div style="display:flex; align-items:center; gap:8px; background:#0f172a; padding:5px; border-radius:8px;">
                                <img src="${item.img}" class="order-item-img">
                                <span style="font-size:10px;">${item.title}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div style="font-size:11px; color:#94a3b8;">Date: ${o.date}</div>
                </div>
            `).join('');
        }

        // --- ADMIN VIEW: CONTROL PANEL ---
        function renderAdminOrders() {
            const container = document.getElementById('admin-order-list');
            if(orders.length === 0) { container.innerHTML = '<p style="text-align:center;">No orders yet.</p>'; return; }

            container.innerHTML = orders.map((o, idx) => `
                <div class="order-card" id="admin-card-${idx}">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <b>ID: #${o.id} | ${o.userName}</b>
                        <span class="status-tag" style="background:${getStatusColor(o.status)}">${o.status}</span>
                    </div>
                    <div style="font-size:11px; color:#cbd5e1; margin-bottom:8px;">Address: ${o.address}</div>
                    <div style="display:flex; gap:5px; margin-bottom:10px;">
                        ${o.items.map(i => `<img src="${i.img}" class="order-item-img" title="${i.title}">`).join('')}
                    </div>
                    <div class="action-btns">
                        <button class="btn-status" style="background:var(--success);" onclick="updateStatus(${idx}, 'Confirmed')">Confirm</button>
                        <button class="btn-status" style="background:var(--danger);" onclick="updateStatus(${idx}, 'Rejected')">Reject</button>
                        <button class="btn-status" style="background:#475569; flex:0.4;" onclick="deleteOrder(${idx})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function updateStatus(idx, status) {
            orders[idx].status = status;
            localStorage.setItem('eshop_orders', JSON.stringify(orders));
            tg.showAlert("Order " + status);
            renderAdminOrders();
        }

        function deleteOrder(idx) {
            if(confirm("Delete this order?")) {
                orders.splice(idx, 1);
                localStorage.setItem('eshop_orders', JSON.stringify(orders));
                renderAdminOrders();
            }
        }

        function searchOrders() {
            let val = document.getElementById('adminSearchInput').value.toLowerCase();
            let cards = document.querySelectorAll('#admin-order-list .order-card');
            cards.forEach(c => c.style.display = c.innerText.toLowerCase().includes(val) ? "block" : "none");
        }

        function getStatusColor(s) {
            if(s === 'Confirmed') return 'var(--success)';
            if(s === 'Rejected') return 'var(--danger)';
            return 'var(--warning)';
        }

        function toggleAddressBox() {
            let b = document.getElementById('address-box');
            b.style.display = b.style.display === 'block' ? 'none' : 'block';
            document.getElementById('address-input').value = localStorage.getItem('user_address') || "";
        }

        function saveAddress() {
            localStorage.setItem('user_address', document.getElementById('address-input').value);
            tg.showAlert("Address Saved!");
            toggleAddressBox();
        }

        function promptAdminLogin() {
            if(prompt("Admin Name:") === "zoha" && prompt("Admin Code:") === "22446688") nav('admin');
            else tg.showAlert("Wrong Admin Credentials!");
        }

        // Init Profile
        const user = tg.initDataUnsafe.user;
        if(user) {
            document.getElementById('u-name').innerText = user.first_name + " " + (user.last_name || "");
            document.getElementById('u-id').innerText = "#" + user.id;
            document.getElementById('u-pic').innerText = user.first_name[0].toUpperCase();
        }
    </script>
</body>
</html>
