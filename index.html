<div id="profile-page" class="page" style="display:none;">
    <div class="user-header">
        <h2 id="user-name-display">Loading...</h2>
        <p id="user-id-display" class="user-id">#000000000</p>
    </div>

    <div class="shipping-section">
        <h3>SHIPPING ADDRESS</h3>
        <div id="address-input-area">
            <textarea id="shipping-address" placeholder="Enter your address..."></textarea>
            <button onclick="saveAddress()" class="save-btn">Save</button>
        </div>
        <div id="saved-address-display" style="display:none;">
            <p id="address-text"></p>
            <button onclick="editAddress()" class="edit-btn">Edit</button>
        </div>
    </div>

    <div class="profile-buttons">
        <button class="btn"><i class="fas fa-box"></i> My Orders</button>
        <button id="admin-btn" class="btn admin-btn" style="display:none;"><i class="fas fa-user-shield"></i> Admin Panel</button>
    </div>
</div>

<script>
// টেলিগ্রাম থেকে ইউজার ডাটা নেওয়া
const tg = window.Telegram.WebApp;
const user = tg.initDataUnsafe?.user;

if (user) {
    document.getElementById('user-name-display').innerText = user.first_name + (user.last_name ? " " + user.last_name : "");
    document.getElementById('user-id-display').innerText = "#" + user.id;
    
    // এডমিন চেক (তোমার আইডি হলে এডমিন প্যানেল দেখাবে)
    if (user.id === 5244583155) { // তোমার আইডি দিয়ে রিপ্লেস করো
        document.getElementById('admin-btn').style.display = 'block';
    }
}

// অ্যাড্রেস সেভ এবং হাইড করার ফাংশন
function saveAddress() {
    const addr = document.getElementById('shipping-address').value;
    if (addr.trim() !== "") {
        localStorage.setItem('userAddress', addr);
        displayAddress(addr);
    }
}

function displayAddress(addr) {
    document.getElementById('address-input-area').style.display = 'none'; // বক্স হাইড হবে
    document.getElementById('saved-address-display').style.display = 'block'; // টেক্সট দেখাবে
    document.getElementById('address-text').innerText = addr;
}

function editAddress() {
    document.getElementById('address-input-area').style.display = 'block';
    document.getElementById('saved-address-display').style.display = 'none';
}

// পেজ লোড হওয়ার সময় চেক করা
window.onload = () => {
    const savedAddr = localStorage.getItem('userAddress');
    if (savedAddr) {
        displayAddress(savedAddr);
    }
};
</script>
