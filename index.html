<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eShop365 Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin:0; padding:0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .container { padding:15px; padding-bottom:100px; max-width: 600px; margin: 0 auto; }
        .page { display:none; } .page.active { display:block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Headers & Grid */
        .section-h { display:flex; align-items:center; gap:8px; color:var(--primary); font-size:12px; font-weight:800; margin:20px 0 10px; border-left:3px solid var(--primary); padding-left:8px; text-transform:uppercase; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .btn-cat { background:var(--card); padding:14px; border-radius:12px; text-align:center; border:1px solid #334155; font-size:12px; font-weight:600; cursor:pointer; color: white; display:flex; align-items:center; justify-content:center; gap:5px; }

        /* Product Cards & Modal */
        .product-grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; padding:10px 0; }
        .p-card { background: #ffffff; border-radius:15px; overflow:hidden; color: #333; position:relative; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .p-img-box { width:100%; height:170px; background:#f3f4f6; display:flex; align-items:center; justify-content:center; overflow: hidden; }
        .p-img-box img { max-width:100%; max-height:100%; object-fit: contain; }
        .p-details { padding:12px; text-align:center; }
        .btn-view-buy { background: var(--primary); color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; }

        /* Profile & List Items */
        .u-header { text-align:center; padding:25px 0; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); border-radius: 15px; margin-bottom: 20px; border: 1px solid #334155; }
        .profile-list { background:var(--card); border-radius:15px; border: 1px solid #334155; overflow: hidden; }
        .list-item { display:flex; align-items:center; padding:18px; border-bottom:1px solid #334155; gap:15px; cursor:pointer; }
        
        /* Address Box Hidden */
        #address-box { display: none; background: var(--card); padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #334155; }
        .address-input { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; margin-top: 5px; box-sizing: border-box; }

        /* Bottom Nav */
        .bottom-nav { position:fixed; bottom:0; width:100%; max-width: 600px; left: 50%; transform: translateX(-50%); background:#1e293b; display:flex; height:75px; border-top:1px solid #334155; z-index:1000; }
        .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#94a3b8; font-size:11px; cursor:pointer; position: relative; }
        .nav-item.active { color:var(--primary); }
        
        /* Admin Search UI */
        .admin-search { width: 100%; padding: 12px; background: var(--card); border: 2px solid var(--primary); color: white; border-radius: 10px; margin-bottom: 15px; outline: none; }
        .status-tag { padding:4px 8px; border-radius:8px; font-size:10px; font-weight:bold; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <div id="p-shop" class="page active">
            <div class="section-h"><i class="fas fa-bolt"></i> HOT DEALS</div>
            <div class="grid">
                <div class="btn-cat" onclick="openList('hotdeals/summer/', 'Summer Offer')">☀️ Summer Offer</div>
                <div class="btn-cat" onclick="openList('hotdeals/sale/', 'Big Sale')">🎁 Big Sale</div>
            </div>

            <div class="section-h"><i class="fas fa-tshirt"></i> T-SHIRTS</div>
            <div class="grid">
                <div class="btn-cat" onclick="openList('tshirts/printed/', 'Printed')">Printed</div>
                <div class="btn-cat" onclick="openList('tshirts/polo/', 'Polo')">Polo</div>
            </div>

            <div class="section-h"><i class="fas fa-user-tie"></i> SHIRTS</div>
            <div class="grid">
                <div class="btn-cat" onclick="openList('shirt/formal/', 'Formal')">Formal</div>
                <div class="btn-cat" onclick="openList('shirt/casual/', 'Casual')">Casual</div>
                <div class="btn-cat" onclick="openList('shirt/half/', 'Half Shirt')">Half Shirt</div>
            </div>

            <div class="section-h"><i class="fas fa-vest"></i> PANTS</div>
            <div class="grid">
                <div class="btn-cat" onclick="openList('pants/gabardine/', 'Gabardine Pant')">👖 Gabardine Pant</div>
                <div class="btn-cat" onclick="openList('pants/jeans/', 'Jeans')">Jeans</div>
                <div class="btn-cat" onclick="openList('pants/formal/', 'Formal')">Formal</div>
                <div class="btn-cat" onclick="openList('pants/cargo/', 'Cargo')">Cargo</div>
            </div>

            <div class="section-h"><i class="fas fa-belt"></i> ACCESSORIES</div>
            <div class="grid">
                <div class="btn-cat" onclick="openList('innerwear/', 'Innerwear')">🩲 Innerwear</div>
                <div class="btn-cat" onclick="openList('accessories/belt/', 'Leather Belts')">Belts</div>
                <div class="btn-cat" onclick="openList('accessories/tie/', 'Premium Ties')">Ties</div>
                <div class="btn-cat" onclick="openList('accessories/wallet/', 'Wallets')">Wallets</div>
            </div>
        </div>

        <div id="p-profile" class="page">
            <div class="u-header">
                <div style="width:70px; height:70px; background:var(--primary); border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:24px; color: white;" id="u-pic">?</div>
                <h3 id="u-name" style="margin:0;">User</h3>
                <p id="u-id" style="font-size:12px; color:var(--primary);">#ID</p>
            </div>
            <div class="profile-list">
                <div class="list-item" onclick="toggleAddressBox()"><i class="fas fa-map-marker-alt"></i> <span>Manage Address</span> <i class="fas fa-chevron-down" style="margin-left:auto;"></i></div>
                <div id="address-box">
                    <textarea id="address-input" class="address-input" placeholder="Address & Mobile No..."></textarea>
                    <button class="btn-view-buy" style="margin-top:10px; background:var(--success);" onclick="saveAddress()">Save Address</button>
                </div>
                <div class="list-item" onclick="nav('orders')"><i class="fas fa-box"></i> <span>My Orders</span> <i class="fas fa-chevron-right" style="margin-left:auto;"></i></div>
                <div class="list-item" onclick="promptAdminLogin()" style="color:var(--warning);"><i class="fas fa-user-shield"></i> <span>Admin Dashboard</span> <i class="fas fa-chevron-right" style="margin-left:auto;"></i></div>
            </div>
        </div>

        <div id="p-admin" class="page">
            <div class="section-h">ADMIN CONTROL</div>
            <input type="text" id="adminSearchInput" class="admin-search" placeholder="Search by Order ID or Name..." oninput="searchOrders()">
            <div id="admin-order-list"></div>
        </div>

        <div id="p-orders" class="page">
            <div class="section-h">ORDER HISTORY</div>
            <div id="order-list-container"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="nav('shop')"><i class="fas fa-store"></i>Menu</div>
        <div class="nav-item" onclick="nav('cart')"><i class="fas fa-shopping-basket"></i>Cart</div>
        <div class="nav-item" onclick="nav('profile')"><i class="fas fa-user-circle"></i>Profile</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let orders = JSON.parse(localStorage.getItem('eshop_orders')) || [];

        function nav(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById('p-' + p).classList.add('active');
            if(p === 'orders') renderOrders();
            if(p === 'admin') renderAdminOrders();
        }

        // Admin Order Management
        function renderAdminOrders() {
            const container = document.getElementById('admin-order-list');
            if(orders.length === 0) { container.innerHTML = '<p style="text-align:center;">No orders.</p>'; return; }
            
            container.innerHTML = orders.map((o, idx) => `
                <div class="order-card" style="background:var(--card); padding:15px; border-radius:12px; margin-bottom:10px; border:1px solid #334155;">
                    <div style="display:flex; justify-content:space-between;">
                        <b>ID: #${o.id}</b>
                        <span class="status-tag" style="background:${o.status === 'Confirmed' ? 'var(--success)' : (o.status === 'Rejected' ? 'var(--danger)' : 'var(--warning)')}">${o.status}</span>
                    </div>
                    <p style="font-size:11px; margin:5px 0; color:#94a3b8;">User: ${o.userName}<br>Addr: ${o.address}</p>
                    <div style="display:flex; gap:8px; margin-top:10px;">
                        <button onclick="updateStatus(${idx}, 'Confirmed')" style="flex:1; padding:8px; background:var(--success); border:none; border-radius:5px; color:white; font-size:11px;">Confirm</button>
                        <button onclick="updateStatus(${idx}, 'Rejected')" style="flex:1; padding:8px; background:var(--danger); border:none; border-radius:5px; color:white; font-size:11px;">Reject</button>
                    </div>
                </div>
            `).join('');
        }

        function updateStatus(idx, status) {
            orders[idx].status = status;
            localStorage.setItem('eshop_orders', JSON.stringify(orders));
            tg.showAlert("Order " + status);
            renderAdminOrders();
        }

        function searchOrders() {
            let val = document.getElementById('adminSearchInput').value.toLowerCase();
            let cards = document.querySelectorAll('#admin-order-list .order-card');
            cards.forEach(c => c.style.display = c.innerText.toLowerCase().includes(val) ? "block" : "none");
        }

        function renderOrders() {
            const container = document.getElementById('order-list-container');
            container.innerHTML = orders.map(o => `
                <div class="order-card" style="background:var(--card); padding:15px; border-radius:12px; margin-bottom:10px; border-left:4px solid ${o.status === 'Confirmed' ? 'var(--success)' : 'var(--warning)'}">
                    <b>Order #${o.id}</b> - <span style="color:var(--primary)">${o.status}</span>
                </div>
            `).join('');
        }

        function toggleAddressBox() {
            let b = document.getElementById('address-box');
            b.style.display = b.style.display === 'block' ? 'none' : 'block';
        }

        function saveAddress() {
            localStorage.setItem('user_address', document.getElementById('address-input').value);
            tg.showAlert("Saved!"); toggleAddressBox();
        }

        function promptAdminLogin() {
            if(prompt("Name:") === "zoha" && prompt("Code:") === "22446688") nav('admin');
        }

        // Profile Init
        const user = tg.initDataUnsafe.user;
        if(user) {
            document.getElementById('u-name').innerText = user.first_name;
            document.getElementById('u-id').innerText = "#" + user.id;
            document.getElementById('u-pic').innerText = user.first_name[0];
        }
    </script>
</body>
</html>
