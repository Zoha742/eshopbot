<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eShop365 Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin:0; padding:0; overflow:hidden; display:flex; flex-direction:column; }
        .container { flex:1; overflow-y:auto; padding:15px; padding-bottom:90px; }
        .page { display:none; } .page.active { display:block; }
        
        /* Bottom Navigation */
        .bottom-nav { position:fixed; bottom:0; left:0; width:100%; background:#1e293b; display:flex; border-top:1px solid #334155; height:70px; }
        .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:11px; color:#94a3b8; cursor:pointer; }
        .nav-item.active { color:var(--primary); }
        .nav-item i { font-size:20px; margin-bottom:3px; }

        /* Headers */
        .section-h { display:flex; align-items:center; gap:8px; color:var(--primary); font-size:12px; font-weight:800; margin:20px 0 10px; border-left:3px solid var(--primary); padding-left:8px; text-transform:uppercase; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .btn-cat { background:var(--card); padding:12px; border-radius:10px; text-align:center; border:1px solid #334155; font-size:12px; font-weight:600; }

        /* Profile & Dashboard */
        .profile-card { background:linear-gradient(180deg, #1e293b, #0f172a); border-radius:15px; padding:20px; text-align:center; border:1px solid #334155; }
        .avatar { width:70px; height:70px; border-radius:50%; background:var(--primary); margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:bold; }
        .stats { display:flex; justify-content:space-around; margin-top:15px; background:rgba(0,0,0,0.2); padding:10px; border-radius:10px; }
        .stat-item b { display:block; color:var(--primary); font-size:14px; }
        .stat-item span { font-size:10px; color:#94a3b8; }

        /* Address Box */
        .box { background:var(--card); padding:15px; border-radius:12px; margin-top:15px; border:1px solid #334155; }
        .input-f { width:100%; padding:10px; background:#0f172a; color:white; border:1px solid #334155; border-radius:8px; margin-top:8px; box-sizing:border-box; }
        .btn-confirm { width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold; margin-top:15px; cursor:pointer; }
        .hidden { display:none; }

        /* Modal */
        #modal { position:fixed; inset:0; background:var(--bg); z-index:2000; display:none; flex-direction:column; }
        .m-img { flex:1; display:flex; align-items:center; justify-content:center; background:#000; }
        .m-img img { max-width:100%; max-height:100%; }
        .m-info { background:var(--card); padding:20px; border-radius:20px 20px 0 0; margin-top:-20px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="p-shop" class="page active">
            <div class="section-h"><i class="fas fa-bolt"></i> Hot Deals</div>
            <div class="grid">
                <div class="btn-cat" onclick="openP('hotdeals/summer/', 'Summer Offer')">☀️ Summer Offer</div>
                <div class="btn-cat" onclick="openP('hotdeals/sale/', 'Big Sale')">🎁 Big Sale</div>
            </div>

            <div class="section-h"><i class="fas fa-tshirt"></i> T-Shirts & Shirts</div>
            <div class="grid">
                <div class="btn-cat" onclick="openP('tshirts/printed/', 'Printed T-shirt')">Printed</div>
                <div class="btn-cat" onclick="openP('tshirts/polo/', 'Polo T-shirt')">Polo</div>
                <div class="btn-cat" onclick="openP('shirt/formal/', 'Formal Shirt')">Formal</div>
                <div class="btn-cat" onclick="openP('shirt/half/', 'Half Shirt')">Half Shirt</div>
            </div>

            <div class="section-h"><i class="fas fa-user-tag"></i> Pants (Separate)</div>
            <div class="grid">
                <div class="btn-cat" onclick="openP('pants/jeans/', 'Jeans Pant')">Jeans</div>
                <div class="btn-cat" onclick="openP('pants/formal/', 'Formal Pant')">Formal</div>
                <div class="btn-cat" onclick="openP('pants/gabardine/', 'Gabardine')">Gabardine</div>
            </div>

            <div class="section-h"><i class="fas fa-mosque"></i> Panjabi (Separate)</div>
            <div class="grid">
                <div class="btn-cat" onclick="openP('panjabi/easy/', 'Easy Panjabi')">Easy</div>
                <div class="btn-cat" onclick="openP('panjabi/kabli/', 'Kabli Set')">Kabli</div>
            </div>
        </div>

        <div id="p-dash" class="page">
            <div class="profile-card">
                <div class="avatar" id="u-pic">K</div>
                <h3 id="u-name" style="margin:0;">User</h3>
                <p id="u-id" style="color:var(--primary); font-size:11px; margin:5px 0;">#ID</p>
                <div class="stats">
                    <div class="stat-item"><b id="s-ord">0</b><span>Orders</span></div>
                    <div class="stat-item"><b id="s-spent">$0</b><span>Spent</span></div>
                    <div class="stat-item"><b>VIP</b><span>Rank</span></div>
                </div>
            </div>

            <div id="addr-box" class="box">
                <b style="font-size:11px; color:var(--primary);">SHIPPING ADDRESS</b>
                <div id="addr-in">
                    <input type="text" id="ship-n" class="input-f" placeholder="Full Name">
                    <textarea id="ship-a" class="input-f" placeholder="Full Address..."></textarea>
                    <button class="btn-confirm" style="padding:10px;" onclick="saveAddr()">Save Address</button>
                </div>
                <div id="addr-out" class="hidden">
                    <p id="txt-addr" style="font-size:12px; margin:10px 0;"></p>
                    <button onclick="editAddr()" style="background:none; border:none; color:var(--primary); font-size:11px;">Change</button>
                </div>
            </div>

            <div class="section-h">Order History</div>
            <div id="order-list" class="box" style="font-size:12px; text-align:center;">No orders yet.</div>
        </div>
    </div>

    <div id="modal">
        <div class="m-img">
            <button onclick="closeP()" style="position:absolute; top:20px; left:20px; background:rgba(0,0,0,0.5); border:none; color:white; width:40px; height:40px; border-radius:50%;"><i class="fas fa-arrow-left"></i></button>
            <img id="m-img-src" src="">
        </div>
        <div class="m-info">
            <h2 id="m-title" style="margin:0;">Product</h2>
            <p style="color:var(--primary); font-size:24px; font-weight:800; margin:10px 0;">$15.00</p>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <div class="btn-cat" style="padding:8px 15px;" onclick="selectSize(this)">M</div>
                <div class="btn-cat active" style="padding:8px 15px; border-color:var(--primary);" onclick="selectSize(this)">L</div>
                <div class="btn-cat" style="padding:8px 15px;" onclick="selectSize(this)">XL</div>
            </div>
            <button class="btn-confirm" onclick="confirmOrder()">CONFIRM ORDER</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="nav('shop', this)"><i class="fas fa-store"></i>Store</div>
        <div class="nav-item" onclick="nav('dash', this)"><i class="fas fa-user-circle"></i>Dashboard</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const BASE_IMG = "https://raw.githubusercontent.com/Zoha742/eshopbot/main/products/";
        let db = { orders: JSON.parse(localStorage.getItem('eshop_orders')) || [] };
        let cur = {};

        function nav(p, el) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(ni => ni.classList.remove('active'));
            document.getElementById('p-' + p).classList.add('active');
            el.classList.add('active');
            if(p === 'dash') refreshDash();
        }

        function openP(path, name) {
            cur = { name, img: BASE_IMG + path + '1.jpg' };
            document.getElementById('m-img-src').src = cur.img;
            document.getElementById('m-title').innerText = name;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeP() { document.getElementById('modal').style.display = 'none'; }

        async function confirmOrder() {
            const addr = localStorage.getItem('eshop_addr');
            if(!addr) { tg.showAlert("আগে ড্যাশবোর্ডে অ্যাড্রেস সেভ করুন!"); return; }

            const o = { id: '#' + Math.floor(1000+Math.random()*9000), product: cur.name, status: "Pending" };
            
            // MongoDB-তে ডাটা পাঠানো
            const response = await fetch('/save-order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    tgId: tg.initDataUnsafe.user.id,
                    name: localStorage.getItem('eshop_name'),
                    address: addr,
                    order: o
                })
            });

            if(response.ok) {
                db.orders.push(o);
                localStorage.setItem('eshop_orders', JSON.stringify(db.orders));
                tg.showPopup({ title: "Order Placed!", message: "অর্ডারটি আপনার ড্যাশবোর্ডে যোগ হয়েছে।" });
                closeP();
                nav('dash', document.querySelectorAll('.nav-item')[1]);
            }
        }

        function saveAddr() {
            const n = document.getElementById('ship-n').value;
            const a = document.getElementById('ship-a').value;
            if(!n || !a) return;
            localStorage.setItem('eshop_name', n);
            localStorage.setItem('eshop_addr', a);
            updateAddrUI();
        }

        function updateAddrUI() {
            const a = localStorage.getItem('eshop_addr');
            if(a) {
                document.getElementById('addr-in').classList.add('hidden');
                document.getElementById('addr-out').classList.remove('hidden');
                document.getElementById('txt-addr').innerText = localStorage.getItem('eshop_name') + "\n" + a;
            }
        }

        function editAddr() {
            document.getElementById('addr-in').classList.remove('hidden');
            document.getElementById('addr-out').classList.add('hidden');
        }

        function refreshDash() {
            document.getElementById('s-ord').innerText = db.orders.length;
            document.getElementById('s-spent').innerText = '$' + (db.orders.length * 15);
            const list = document.getElementById('order-list');
            if(db.orders.length > 0) {
                list.innerHTML = db.orders.map(o => `<div class="btn-cat" style="margin-top:5px; text-align:left;"><b>${o.product}</b> <span style="float:right; color:var(--primary);">${o.status}</span></div>`).join('');
            }
        }

        const user = tg.initDataUnsafe.user;
        if(user) {
            document.getElementById('u-name').innerText = user.first_name;
            document.getElementById('u-id').innerText = "#" + user.id;
        }
        updateAddrUI();
    </script>
</body>
</html>
