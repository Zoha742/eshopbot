<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eShop365 Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .tabs { display: flex; background: #1e293b; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #334155; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #94a3b8; }
        .tab.active { color: #38bdf8; border-bottom: 3px solid #38bdf8; }
        .content { display: none; padding: 15px; }
        .content.active { display: block; }
        .section-title { color: #38bdf8; margin: 15px 0 10px 0; font-size: 13px; font-weight: bold; text-transform: uppercase; border-left: 3px solid #38bdf8; padding-left: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #1e293b; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #334155; cursor: pointer; font-size: 12px; }
        .prod-card { background: #1e293b; border-radius: 12px; border: 1px solid #334155; overflow: hidden; position: relative; }
        .prod-card img { width: 100%; height: 140px; object-fit: cover; }
        .fav-btn { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 50%; color: #94a3b8; cursor: pointer; }
        .fav-btn.active { color: #ef4444; }
        .input { width: 100%; padding: 10px; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 8px; margin-top: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; color: white; }
        #gallery-view { position: fixed; top: 48px; left: 0; width: 100%; height: calc(100% - 48px); background: #0f172a; z-index: 200; display: none; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .sub-sec { display: none; background: #1e293b; padding: 15px; border-radius: 12px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="tabs">
        <div id="t-store" class="tab active" onclick="switchTab('store')">🏪 STORE</div>
        <div id="t-profile" class="tab" onclick="switchTab('profile')">👤 PROFILE</div>
    </div>

    <div id="store" class="content active">
        <div class="section-title">👕 T-Shirts</div>
        <div class="grid">
            <div class="card" onclick="loadGal('tshirts/printed/', 'Printed T-shirt')">Printed T-shirt</div>
            <div class="card" onclick="loadGal('tshirts/polo/', 'Polo T-shirt')">Polo T-shirt</div>
        </div>

        <div class="section-title">👔 Shirts</div>
        <div class="grid">
            <div class="card" onclick="loadGal('shirt/casual/', 'Casual shirt')">Casual</div>
            <div class="card" onclick="loadGal('shirt/formal/', 'Formal shirt')">Formal</div>
            <div class="card" onclick="loadGal('shirt/half/', 'Half Shirt')">Half</div>
        </div>

        <div class="section-title">👖 Pants</div>
        <div class="grid">
            <div class="card" onclick="loadGal('pants/formal/', 'Formal Pant')">Formal</div>
            <div class="card" onclick="loadGal('pants/jeans/', 'Jeans Pant')">Jeans</div>
        </div>

        <div class="section-title">🕌 Panjabi</div>
        <div class="grid">
            <div class="card" onclick="loadGal('panjabi/easy/', 'Easy Panjabi')">Easy</div>
            <div class="card" onclick="loadGal('panjabi/kabli/', 'Kabli Panjabi')">Kabli</div>
        </div>

        <div id="gallery-view">
            <button onclick="hideGal()" style="color:#38bdf8; background:none; border:none; margin-bottom:15px; font-weight:bold;">⬅️ BACK</button>
            <div class="grid" id="gal-container"></div>
        </div>
    </div>

    <div id="profile" class="content">
        <div style="background:#1e293b; padding:15px; border-radius:12px; text-align:center;">
            <h3 id="u-name">User</h3>
            <p id="u-id" style="color:#38bdf8;">#000000</p>
        </div>

        <div class="grid" style="margin-top:15px;">
            <div class="card" onclick="showSub('cart')"><i class="fas fa-shopping-cart"></i><br>AddCart</div>
            <div class="card" onclick="showSub('record')"><i class="fas fa-history"></i><br>Order Record</div>
            <div class="card" onclick="showSub('love')"><i class="fas fa-heart"></i><br>Love</div>
        </div>

        <div class="sub-sec" id="sub-cart" style="display:block;">
            <h4>📍 Shipping Address</h4>
            <div id="addr-ui">
                <input type="text" id="ship-name" class="input" placeholder="Full Name">
                <textarea id="ship-addr" class="input" placeholder="Address..." style="height:50px;"></textarea>
                <button class="btn" style="background:#38bdf8;" onclick="saveAddr()">Save Address</button>
            </div>
            <div id="addr-saved" style="display:none; font-size:13px; color:#38bdf8; margin-top:5px;">
                ✅ Address Saved! <span onclick="editAddr()" style="text-decoration:underline; cursor:pointer;">Edit</span>
            </div>
            <h4 style="margin-top:20px;">🛒 My Items</h4>
            <div id="cart-list"></div>
            <div id="checkout-btn" style="display:none; border-top:1px solid #334155; margin-top:10px; padding-top:10px;">
                <p>Total: <span id="total-usd">$0</span></p>
                <button class="btn" style="background:#22c55e;" onclick="sendOrder()">Confirm Order</button>
            </div>
        </div>

        <div class="sub-sec" id="sub-record">
            <h4>📜 Past Orders</h4>
            <div id="history-list" style="font-size:12px;">No orders yet.</div>
        </div>
    </div>

    <div id="details-modal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0f172a; z-index:300; display:none; padding:20px; box-sizing:border-box;">
        <button onclick="closeDet()" style="color:#38bdf8; background:none; border:none; font-size:18px;">❌ Close</button>
        <img id="d-img" src="" style="width:100%; border-radius:12px; margin-top:10px;">
        <h2 id="d-title">Product</h2>
        <p style="font-size:22px; color:#38bdf8; font-weight:bold;">$15.00</p>
        <label>Size:</label>
        <select id="d-size" class="input"><option>M</option><option>L</option><option>XL</option><option>XXL</option></select>
        <label style="display:block; margin-top:10px;">Color:</label>
        <select id="d-color" class="input"><option>Black</option><option>White</option><option>Navy</option></select>
        <button class="btn" style="background:#38bdf8;" onclick="addToCart()">Add to Cart</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const IMG_URL = "https://raw.githubusercontent.com/Zoha742/eshopbot/main/products/";
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function switchTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('t-' + id).classList.add('active');
            if(id === 'profile') renderCart();
        }

        function loadGal(path, title) {
            const con = document.getElementById('gal-container');
            con.innerHTML = '';
            document.getElementById('gallery-view').style.display = 'block';
            for(let i=1; i<=4; i++) {
                const img = `${IMG_URL}${path}${i}.jpg`;
                con.innerHTML += `<div class="prod-card">
                    <i class="fas fa-heart fav-btn"></i>
                    <img src="${img}" onclick="openDet('${img}', '${title} #${i}')" onerror="this.src='https://via.placeholder.com/150'">
                    <div style="padding:10px; font-weight:bold;">$15.00</div>
                </div>`;
            }
        }

        function hideGal() { document.getElementById('gallery-view').style.display = 'none'; }
        function openDet(img, title) {
            document.getElementById('d-img').src = img;
            document.getElementById('d-title').innerText = title;
            document.getElementById('details-modal').style.display = 'block';
        }
        function closeDet() { document.getElementById('details-modal').style.display = 'none'; }

        function addToCart() {
            const item = { 
                title: document.getElementById('d-title').innerText, 
                size: document.getElementById('d-size').value, 
                color: document.getElementById('d-color').value, 
                price: 15 
            };
            cart.push(item);
            localStorage.setItem('cart', JSON.stringify(cart));
            tg.showPopup({ message: "Added to Cart!" });
            closeDet();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            if(cart.length === 0) { list.innerHTML = "Cart is empty."; document.getElementById('checkout-btn').style.display = 'none'; return; }
            list.innerHTML = cart.map((i, idx) => `
                <div style="background:#0f172a; padding:10px; border-radius:10px; margin-bottom:5px;">
                    ${i.title} (${i.size}/${i.color}) - $${i.price}
                    <span onclick="remove(${idx})" style="color:#ef4444; float:right;">🗑️</span>
                </div>`).join('');
            document.getElementById('total-usd').innerText = '$' + (cart.length * 15);
            document.getElementById('checkout-btn').style.display = 'block';
        }

        function remove(idx) { cart.splice(idx, 1); localStorage.setItem('cart', JSON.stringify(cart)); renderCart(); }

        function saveAddr() {
            const n = document.getElementById('ship-name').value;
            const a = document.getElementById('ship-addr').value;
            if(!n || !a) return;
            localStorage.setItem('name', n); localStorage.setItem('addr', a);
            document.getElementById('addr-ui').style.display = 'none';
            document.getElementById('addr-saved').style.display = 'block';
        }

        function editAddr() { document.getElementById('addr-ui').style.display = 'block'; document.getElementById('addr-saved').style.display = 'none'; }

        function showSub(id) {
            document.querySelectorAll('.sub-sec').forEach(s => s.style.display = 'none');
            document.getElementById('sub-' + id).style.display = 'block';
            if(id === 'record') renderHistory();
        }

        function sendOrder() {
            const n = localStorage.getItem('name');
            const a = localStorage.getItem('addr');
            if(!n) return tg.showAlert("Save address first!");
            const orderData = { user: tg.initDataUnsafe.user, items: cart, addr: {name: n, a: a}, total: cart.length*15 };
            
            // রেকর্ড সেভ করা
            let history = JSON.parse(localStorage.getItem('history')) || [];
            history.push({date: new Date().toLocaleDateString(), total: orderData.total});
            localStorage.setItem('history', JSON.stringify(history));

            tg.sendData(JSON.stringify(orderData));
            cart = []; localStorage.removeItem('cart');
            tg.close();
        }

        function renderHistory() {
            const h = JSON.parse(localStorage.getItem('history')) || [];
            document.getElementById('history-list').innerHTML = h.map(o => `<div>📅 ${o.date} - Total: $${o.total}</div>`).join('');
        }

        if(localStorage.getItem('name')) { document.getElementById('addr-ui').style.display = 'none'; document.getElementById('addr-saved').style.display = 'block'; }
        const u = tg.initDataUnsafe.user;
        if(u) { document.getElementById('u-name').innerText = u.first_name; document.getElementById('u-id').innerText = "#" + u.id; }
    </script>
</body>
</html>
