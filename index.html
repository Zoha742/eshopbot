<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium eShop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 15px; }
        .tab-container { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 1px solid #333; }
        .tab { padding: 10px; cursor: pointer; color: #888; }
        .tab.active { color: #0088cc; border-bottom: 2px solid #0088cc; }
        .section { display: none; }
        .section.active { display: block; }
        .item-card { background: #2a2a2a; padding: 10px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-pay { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 5px; width: 100%; margin-top: 10px; }
        .profile-header { text-align: center; margin-bottom: 20px; }
        .profile-header img { width: 60px; border-radius: 50%; border: 2px solid #0088cc; }
    </style>
</head>
<body>
    <div class="tab-container">
        <div class="tab active" onclick="openTab('store')">🏪 Shop</div>
        <div class="tab" onclick="openTab('profile')">👤 Profile</div>
    </div>

    <div id="store" class="section active">
        <h3>Premium Collection</h3>
        <div id="product-list">
            <p style="color:#aaa; font-size: 14px;">Select items from the bot to see them in your cart.</p>
        </div>
    </div>

    <div id="profile" class="section">
        <div class="profile-header">
            <img id="user-pic" src="https://via.placeholder.com/60" alt="User">
            <h3 id="user-name">User: ZOZO</h3>
        </div>
        
        <div style="background:#2a2a2a; padding:15px; border-radius:10px;">
            <h4>💳 Payment Methods</h4>
            <button class="btn-pay" style="background:#0088cc;" onclick="pay('TON')">Connect TON Wallet</button>
            <button class="btn-pay" onclick="pay('Local')">Local Payment (Bkash/Rocket)</button>
        </div>

        <div style="margin-top:20px;">
            <h4>🛒 My Cart / Favorites</h4>
            <div id="cart-items" style="font-size:14px; color:#ccc;">No items added yet.</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function openTab(tabName) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function pay(method) {
            tg.showPopup({ title: 'Payment', message: 'Proceed with ' + method + ' payment?', buttons: [{text: 'Pay Now', type: 'ok'}] });
        }
        
        const user = tg.initDataUnsafe.user;
        if(user) document.getElementById('user-name').innerText = "User: " + user.first_name;
    </script>
</body>
</html>
